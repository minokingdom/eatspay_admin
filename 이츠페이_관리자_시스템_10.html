  try{sessionStorage.setItem(ADMIN_PAGE_KEY,page||'dashboard');}catch(_){}
}

  try{
    const params=new URLSearchParams(location.search||'');
    const urlFrDetail=params.get('franchiseId')||params.get('franchiseDetail')||'';
    if(urlFrDetail){
      frDetailId=urlFrDetail;
      page='franchiseDetail';
      sessionStorage.setItem(ADMIN_FR_DETAIL_KEY,String(urlFrDetail));
      sessionStorage.setItem(ADMIN_PAGE_KEY,'franchiseDetail');
      history.replaceState(null,'','/admin');
      return;
    }
    const saved=sessionStorage.getItem(ADMIN_PAGE_KEY)||'';
    if(saved&&canAccessPage(saved))page=saved;
    const savedFrDetail=sessionStorage.getItem(ADMIN_FR_DETAIL_KEY)||'';
    if(savedFrDetail)frDetailId=savedFrDetail;
  }catch(_){}

    franchiseFilters={q:'',accountStatus:'',cardFilter:'',joinStart:'',payStart:'',agencyFilter:''};
    _sddSel.frag='';
  }catch(_){}
}

function getAllDA(){return D.deliveryAgencyList.filter(a=>a.status!=='deleted');}
function getPending(){const r=[];D.franchises.forEach(f=>{(f.deliveryAgencies||[]).forEach((da,i)=>{if(da.accountStatus==='승인대기')r.push({fid:f.id,fname:f.name,idx:i,...da});});});return r;}
function agencyChildren(id){return (D.agencies||[]).filter(x=>String(x.parentId||'')===String(id));}
function agencySubtreeIds(id){
  const root=String(id||'');
  if(!root)return[];
  const ids=[root];
  const walk=pid=>agencyChildren(pid).forEach(ch=>{ids.push(String(ch.id));walk(ch.id);});
  walk(root);
  return ids;
}
function defaultAgentAgencyId(){
  const agencies=D.agencies||[];
  return String(agencies.find(a=>agencyTypeKey(a)!=='bonbu')?.id||agencies[0]?.id||'');

function canAccessPage(id){
  if(role==='agent'&&id==='myUrl')return true;
  if(role==='agent'){
    const agentAllowed=new Set(AG_NAV.filter(item=>item.id).map(item=>item.id).concat(['franchiseDetail']));

  }
  const perms=Array.isArray(currentAdmin?.adminPermissions)?currentAdmin.adminPermissions:[];
  if(perms.length){
    if(id==='franchiseDetail'&&perms.includes('franchises'))return true;
    return perms.includes(id);
  }

  if(id==='franchiseDetail'&&(!allowed||allowed.includes('franchises')))return true;
  return !allowed||allowed.includes(id);

function renderNav(){
  const rawItems=role==='hq'?HQ_NAV:AG_NAV;
  const items=[];
  rawItems.forEach((item,idx)=>{
    if(item.s){
      const rest=rawItems.slice(idx+1);
      const nextSectionIndex=rest.findIndex(next=>next.s);
      const sectionItems=nextSectionIndex>=0?rest.slice(0,nextSectionIndex):rest;
      const hasVisible=sectionItems.some(next=>next.id&&canAccessPage(next.id));
      if(hasVisible)items.push(item);
      return;
    }
    if(item.id&&canAccessPage(item.id))items.push(item);
  });
  if(page&&!canAccessPage(page))page=firstAllowedPage();
  const scopedFrs=role==='agent'?scopedFranchises():(D.franchises||[]);
  const scopedPays=role==='agent'?scopedPayments():(D.payments||[]);
  const pc=getPending().filter(p=>role!=='agent'||scopedFrs.some(f=>String(f.id)===String(p.fid))).length;
  const newFranchiseCount=scopedFrs.filter(isNewFranchise).length;
  const newPaymentCount=scopedPays.filter(isRecentPayment).length;
  let h='';
  items.forEach(i=>{
    if(i.s){h+=`<div class="ns">${i.s}</div>`;return;}
    const a=page===i.id?' on':'',s=i.sub?' sub':'';
    const nb=i.nw?'<span class="nb">NEW</span>':'';
    const pb=(i.id==='dashboard'&&pc>0)?`<span class="nb">${pc}</span>`:'';
    const fb=(i.id==='franchises'&&newFranchiseCount>0)?`<span class="nb">${newFranchiseCount}</span>`:'';
    const payb=(i.id==='payments'&&newPaymentCount>0)?`<span class="nb">${newPaymentCount}</span>`:'';
    h+=`<div class="ni${a}${s}" data-admin-nav="${i.id}">${ml(i.id)}${nb}${pb}${fb}${payb}</div>`;
  });
  document.getElementById('nav').innerHTML=h;
  document.getElementById('ptitle').textContent=ml(page);
  renderAgentPicker();
  const roleLabel=document.getElementById('rlabel');
  if(roleLabel)roleLabel.textContent=currentAdmin?.adminRoleLabel||currentAdmin?.roleLabel||(role==='hq'?'본사 관리자':'영업대리점');
}

function adminTableCellValue(row,index){
  const cell=row.children[index];
  if(!cell)return '';
  const raw=(cell.innerText||cell.textContent||'').trim();
  const numeric=raw.replace(/[^\d.-]/g,'');
  if(numeric&&/^-?\d+(\.\d+)?$/.test(numeric)&&/[0-9]/.test(raw))return Number(numeric);
  return raw;
}
function captureAdminTableOriginalOrder(table){
  const tbody=table.tBodies?.[0];
  if(!tbody)return;
  [...tbody.rows].forEach((row,i)=>{row.dataset.originalIndex=String(i);});
}
function ensureAdminTableOriginalOrder(table){
  const tbody=table.tBodies?.[0];
  if(!tbody)return;
  if([...tbody.rows].some(row=>row.dataset.originalIndex===undefined)){
    captureAdminTableOriginalOrder(table);
  }
}
function resetAdminTableSort(table){
  const tbody=table.tBodies?.[0];
  if(!tbody)return;
  [...tbody.rows].sort((a,b)=>(Number(a.dataset.originalIndex||0)-Number(b.dataset.originalIndex||0))).forEach(row=>tbody.appendChild(row));
  table.querySelectorAll('th').forEach(th=>{
    th.dataset.sortDir='';
    const label=th.querySelector('.admin-sort-label');
    if(label)label.textContent='↕';
  });
}
function getAdminTableWidths(){
  try{return JSON.parse(localStorage.getItem(ADMIN_TABLE_COL_WIDTH_KEY)||'{}')||{};}catch(e){return {};}
}
function adminTableWidthKey(table,index){
  return `${table.dataset.adminSortId||'admin-table'}:${index}`;
}
function applyAdminTableColumnWidth(table,index,th){
  const widths=getAdminTableWidths();
  const width=Number(widths[adminTableWidthKey(table,index)]||0);
  if(width>40){th.style.width=width+'px';table.style.tableLayout='fixed';}
}
function startAdminTableColumnResize(ev,table,index,th){
  ev.preventDefault();ev.stopPropagation();
  adminTableResizingUntil=Date.now()+700;
  const startX=ev.clientX,startW=th.offsetWidth;
  table.style.tableLayout='fixed';
  const move=e=>{adminTableResizingUntil=Date.now()+700;th.style.width=Math.max(48,startW+(e.clientX-startX))+'px';};
  const up=()=>{
    adminTableResizingUntil=Date.now()+700;
    const widths=getAdminTableWidths();
    widths[adminTableWidthKey(table,index)]=th.offsetWidth;
    localStorage.setItem(ADMIN_TABLE_COL_WIDTH_KEY,JSON.stringify(widths));
    document.removeEventListener('mousemove',move);
    document.removeEventListener('mouseup',up);
  };
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}
function sortAdminTableByHeader(table,index,th){
  const tbody=table.tBodies?.[0];
  if(!tbody)return;
  ensureAdminTableOriginalOrder(table);
  const next=th.dataset.sortDir==='asc'?'desc':'asc';
  table.querySelectorAll('th').forEach(item=>{if(item!==th){item.dataset.sortDir='';const label=item.querySelector('.admin-sort-label');if(label)label.textContent='↕';}});
  th.dataset.sortDir=next;
  const rows=[...tbody.rows];
  rows.sort((a,b)=>{
    const av=adminTableCellValue(a,index),bv=adminTableCellValue(b,index);
    let cmp=typeof av==='number'&&typeof bv==='number'?av-bv:String(av).localeCompare(String(bv),'ko');
    if(cmp===0)cmp=(Number(a.dataset.originalIndex||0)-Number(b.dataset.originalIndex||0));
    return next==='desc'?-cmp:cmp;
  }).forEach(row=>tbody.appendChild(row));
  const label=th.querySelector('.admin-sort-label');
  if(label)label.textContent=next==='asc'?'▲':'▼';
}
function enableAdminTableSorting(root=document){
  root.querySelectorAll('table').forEach((table,tableIndex)=>{
    const tbody=table.tBodies?.[0];
    const headerRow=table.tHead?.rows?.[0];
    if(!tbody||!headerRow||table.dataset.adminSortBound==='1')return;
    table.dataset.adminSortBound='1';
    table.dataset.adminSortId=table.dataset.adminSortId||`admin-table-${Date.now()}-${tableIndex}`;
    captureAdminTableOriginalOrder(table);
    [...headerRow.cells].forEach((th,index)=>{
      th.classList.add('admin-resizable-th');
      applyAdminTableColumnWidth(table,index,th);
      if(!th.querySelector('.admin-col-resizer')){
        const grip=document.createElement('span');
        grip.className='admin-col-resizer';
        grip.title='드래그: 열 너비 조절';
        grip.addEventListener('mousedown',ev=>startAdminTableColumnResize(ev,table,index,th));
        grip.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();});
        grip.addEventListener('dblclick',ev=>{ev.preventDefault();ev.stopPropagation();});
        th.appendChild(grip);
      }
      if(th.dataset.noSort==='1'||th.querySelector('button'))return;
      th.style.cursor='pointer';
      th.title='클릭: 정렬 / 더블클릭: 정렬 초기화';
      const text=th.textContent.trim();
      th.innerHTML=`<span>${esc(text)}</span> <span class="admin-sort-label">↕</span><span class="admin-col-resizer" title="드래그: 열 너비 조절"></span>`;
      const sortGrip=th.querySelector('.admin-col-resizer');
      sortGrip?.addEventListener('mousedown',ev=>startAdminTableColumnResize(ev,table,index,th));
      sortGrip?.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();});
      sortGrip?.addEventListener('dblclick',ev=>{ev.preventDefault();ev.stopPropagation();});
      th.addEventListener('click',ev=>{
        if(ev.detail>1)return;
        if(Date.now()<adminTableResizingUntil)return;
        if(ev.target.closest?.('.admin-col-resizer'))return;
        sortAdminTableByHeader(table,index,th);
      });
      th.addEventListener('dblclick',ev=>{
        ev.preventDefault();
        if(Date.now()<adminTableResizingUntil)return;
        if(ev.target.closest?.('.admin-col-resizer'))return;
        resetAdminTableSort(table);
      });
    });
  });
}

function bindAdminPassword(id,toggleId){

  if(input.dataset.adminPwBound==='1')return;
  input.dataset.adminPwBound='1';
  input.type='password';
  input.style.color='#111827';
  input.style.webkitTextFillColor='#111827';
  input.style.caretColor='#111827';
  input.style.fontFamily="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif";
  input.style.letterSpacing='1px';
  if(toggle){
    toggle.textContent='보기';
    toggle.disabled=false;
    toggle.style.opacity='1';
    toggle.style.cursor='pointer';
    toggle.onclick=()=>{
      const showing=input.type==='text';
      input.type=showing?'password':'text';
      toggle.textContent=showing?'보기':'숨김';
    };
  }
}

async function submitAdminLogin(){
  const email=v('admin-login-email').trim();
  const password=adminPasswordValue('admin-login-password');
  adminLoginPasswordDraft=password;
  if(!email){setAdminLoginError('관리자 이메일을 입력하세요.','admin-login-email');return;}
  if(!password){setAdminLoginError('비밀번호를 입력하세요.','admin-login-password');return;}
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'로그인에 실패했습니다.');
    const loginRole=json.data?.user?.role||'';
    if(!['ADMIN','AGENCY'].includes(loginRole))throw new Error('관리자 또는 대리점 권한 계정이 아닙니다.');
    adminRuntimeToken=json.data.accessToken||'';
    currentAdmin=json.data.user||null;
    applyCurrentAdminRole();
    sessionStorage.removeItem(ADMIN_TOKEN_KEY);
    localStorage.setItem(ADMIN_TOKEN_KEY,adminRuntimeToken);
    localStorage.setItem(ADMIN_USER_KEY,JSON.stringify(currentAdmin||{}));
    if(document.getElementById('admin-login-remember')?.checked){
      localStorage.setItem('eatspayAdminRememberId','1');
      localStorage.setItem('eatspayAdminEmail',email);
    }else{
      localStorage.removeItem('eatspayAdminRememberId');
      localStorage.removeItem('eatspayAdminEmail');
    }
    setAdminLocked(false);
    closeM();
    adminLoginPasswordDraft='';
    page=canAccessPage(page)?page:firstAllowedPage();
    render();
    syncBackendTransactions({silent:true}).then(()=>render()).catch(()=>{});
    window.__adminLoginResolve&&window.__adminLoginResolve(true);
  }catch(e){
    const raw=String(e.message||'');
    const message=/Invalid (email|loginId) or password/i.test(raw)?'아이디 또는 비밀번호가 일치하지 않습니다. 다시 입력해주세요.':(raw||'로그인에 실패했습니다.');
    setAdminLoginError(message,'admin-login-password');
  }
}
async function ensureAdminLogin(){
  if(adminToken()){setAdminLocked(false);return true;}
  const savedToken=localStorage.getItem(ADMIN_TOKEN_KEY)||sessionStorage.getItem(ADMIN_TOKEN_KEY)||'';
  if(savedToken){
    adminRuntimeToken=savedToken;
    try{currentAdmin=JSON.parse(localStorage.getItem(ADMIN_USER_KEY)||'null')||currentAdmin;}catch(_){}
    applyCurrentAdminRole();
    setAdminLocked(false);
    return true;
  }
  return showAdminLogin();
}
async function handleAdminUnauthorized(res){

function normalizeReceiptCardInfo(payment={},franchise={}){
  const rawName=String(payment.cardCompany||payment.cardName||payment.cardAlias||franchise?.cardCompany||'').trim();
  const rawNumber=String(payment.maskedNumber||payment.cardNumber||payment.cardNo||'').trim();
  const fallbackLast4=String(franchise?.cardLast4||'').replace(/[^0-9]/g,'').slice(-4);
  const maskedPattern=/(\*{2,4}[-\s]?\*{2,4}[-\s]?\*{2,4}[-\s]?\d{2,4})/;
  let cardName=rawName;
  let cardNo=rawNumber;
  const numberMatch=rawNumber.match(maskedPattern);
  if(numberMatch){
    cardNo=numberMatch[1].replace(/\s+/g,'-');
    const prefix=rawNumber.slice(0,numberMatch.index).trim();
    if((!cardName||cardName==='카드'||cardName==='등록카드')&&prefix)cardName=prefix;
  }
  const nameMatch=rawName.match(maskedPattern);
  if(nameMatch){
    cardNo=nameMatch[1].replace(/\s+/g,'-');
    cardName=rawName.slice(0,nameMatch.index).trim()||'카드';
  }
  const last4=String(cardNo||rawNumber||rawName||fallbackLast4).match(/(\d{4})(?!.*\d)/)?.[1]||fallbackLast4;
  if(last4)cardNo=`****-${last4}`;
  if(!cardNo)cardNo='****-****';
  if(!cardName||cardName==='등록카드')cardName='카드';
  return{cardName,cardNo};
}

function dateOnly(value){
  return String(value||'').slice(0,10);
}
function formatKstDateTime(value){
  if(!value)return'-';
  const d=new Date(value);
  if(Number.isNaN(d.getTime()))return String(value);
  return new Intl.DateTimeFormat('ko-KR',{
    timeZone:'Asia/Seoul',
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit',
    hour12:false
  }).format(d).replace(/\\.\\s?/g,'-').replace(/-$/,'');
}
function addDays(date,days){
  const d=new Date(date);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function fmtShort(n){
  const v=Number(n||0);
  if(Math.abs(v)>=100000000)return `${(v/100000000).toFixed(v%100000000?1:0)}억`;
  if(Math.abs(v)>=10000)return `${Math.round(v/10000).toLocaleString()}만`;
  return v.toLocaleString();
}
function svgBar(labels,values,color='#3D9B35'){
  const max=Math.max(1,...values.map(v=>Number(v)||0));
  const bars=values.map((v,i)=>{
    const h=Math.max(4,Math.round((Number(v)||0)/max*86));
    const x=24+i*44;
    const y=104-h;
    return `<g><rect x="${x}" y="${y}" width="24" height="${h}" rx="5" fill="${color}" opacity=".88"></rect><text x="${x+12}" y="122" text-anchor="middle" font-size="10" fill="#6B7280">${labels[i]}</text></g>`;
  }).join('');
  return `<svg viewBox="0 0 ${Math.max(320,labels.length*44+42)} 132" style="width:100%;height:150px;display:block"><line x1="16" y1="104" x2="${Math.max(300,labels.length*44+24)}" y2="104" stroke="#D1E8D1"/><text x="16" y="18" font-size="11" fill="#6B7280">최대 ${fmtShort(max)}</text>${bars}</svg>`;
}
function makeSalesChart(payments){
  const base=new Date();
  const labels=[];
  const values=[];
  for(let i=6;i>=0;i--){
    const day=addDays(base,-i);
    labels.push(day.slice(5).replace('-','.'));
    values.push(payments.filter(p=>dateOnly(p.date)===day).reduce((s,p)=>s+Number(p.amount||0),0));
  }
  return svgBar(labels,values,'#3B82F6');
}
function makeFranChart(franchises){
  const base=new Date();
  const labels=[];
  const values=[];
  for(let i=5;i>=0;i--){
    const end=addDays(base,-i*7);
    const start=addDays(end,-6);
    labels.push(`${end.slice(5,7)}/${end.slice(8,10)}`);
    values.push(franchises.filter(f=>dateOnly(f.joinDate||f.createdAt)>=start&&dateOnly(f.joinDate||f.createdAt)<=end).length);
  }
  return svgBar(labels,values,'#3D9B35');
}

function rPay(){
  const q=(v('ps')||'').toLowerCase(),an=v('pan'),sd=v('psd'),ed=v('ped'),st=v('pst');
  const cid=(v('pcid')||'').toLowerCase(),ptype=v('ptype'),ppg=v('ppg'),amin=Number(v('pamin')||0),amax=Number(v('pamax')||0);
  const selectedAgency=String(_sddSel.pag||''),selectedDa=String(_sddSel.pda||'');
  const el=document.getElementById('pb');if(!el)return;
  const rows=(role==='agent'?scopedPayments():(D.payments||[])).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).filter(p=>{
    const fr=paymentFranchise(p);
    const franchiseName=paymentFranchiseName(p);
    if(q&&!franchiseName.toLowerCase().includes(q)&&!(fr?.owner||'').toLowerCase().includes(q))return false;
    if(cid&&!(p.customerId||fr?.customerId||'').toLowerCase().includes(cid))return false;
    if(an&&!p.approvalNo.includes(an))return false;
    if(st&&p.status!==st)return false;
    if(selectedAgency&&paymentAgencyId(p)!==selectedAgency)return false;
    if(role==='agent'&&!isInAgentScopeAgencyId(paymentAgencyId(p)))return false;
    if(ptype&&p.type!==ptype)return false;
    if(ppg&&p.pg!==ppg)return false;
    if(selectedDa){
      const daName=p.usedDA||p.deliveryAgency||'';
      const hasDa=daName===selectedDa||(fr?.deliveryAgencies||[]).some(a=>a.agency===selectedDa);
      if(!hasDa)return false;
    }
    if(amin&&Number(p.amount||0)<amin)return false;
    if(amax&&Number(p.amount||0)>amax)return false;
    if(sd&&dateOnly(p.date)<sd)return false;
    if(ed&&dateOnly(p.date)>ed)return false;
    return true;
  });
  const total=rows.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const successTotal=rows.filter(p=>p.status==='결제완료').reduce((s,p)=>s+(Number(p.amount)||0),0);
  const cancelCount=rows.filter(p=>p.status&&p.status!=='결제완료').length;
  const totalEl=document.getElementById('pay-total');
  if(totalEl)totalEl.textContent=fmt(total);
  const countEl=document.getElementById('pay-count');
  if(countEl)countEl.textContent=`${rows.length.toLocaleString()}건`;
  const successEl=document.getElementById('pay-success-total');
  if(successEl)successEl.textContent=fmt(successTotal);
  const cancelEl=document.getElementById('pay-cancel-count');
  if(cancelEl)cancelEl.textContent=`${cancelCount.toLocaleString()}건`;
  el.innerHTML=rows.map(p=>{
    const fr=paymentFranchise(p);
    const customerId=p.customerId||fr?.customerId||'-';
    const cancelBtn=p.status==='결제완료'?`<button type="button" class="btn bd xs" data-payment-cancel-guide="${esc(p.approvalNo||p.id||'')}">취소</button>`:'';
    const dateText=String(p.date||'-');
    const dateParts=dateText.split(' ');
    const dateHtml=dateParts.length>1?`${esc(dateParts[0])}<br><span class="payment-date-sub">${esc(dateParts.slice(1).join(' '))}</span>`:esc(dateText);
    return`<tr><td class="payment-date-cell">${dateHtml}</td><td>${esc(p.agency||agencyNameById(paymentAgencyId(p))||'-')}</td><td class="payment-franchise-name">${esc(paymentFranchiseName(p))}</td><td>${esc(p.type||'-')}</td><td class="tg payment-amount-cell">${fmt(p.amount)}</td><td>${esc(p.installment||'-')}</td><td><span class="payment-approval-link" data-payment-receipt-id="${esc(p.id||p.approvalNo||'')}">${esc(p.approvalNo||p.id||'-')}</span></td><td>${bdg(p.status)}</td><td class="payment-customer-id">${esc(customerId)}</td><td>${esc(p.pg||'-')}</td><td>${cancelBtn}</td></tr>`;
  }).join('')||'<tr><td colspan="11" class="emp">검색 결과 없음</td></tr>';
}

async function downloadPgSettlementExport(){
  try{
    const startDate=v('gsd');
    const endDate=v('ged');
    const body={
      startDate,
      endDate,
      status:v('gsst'),
      pg:v('gspg'),
      approvalNo:v('gsan'),
      customerId:v('gscid'),
      franchiseQuery:v('gss'),
      agencyId:String(_sddSel.gsag||''),
      deliveryAgency:String(_sddSel.gsda||'')
    };
    const res=await fetch('/api/settle/export',{
      method:'POST',
      headers:adminAuthHeaders({'Content-Type':'application/json'}),
      body:JSON.stringify(body)
    });
    if(await handleAdminUnauthorized(res))return;
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||err.message||'정산 다운로드에 실패했습니다.');
    }
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`eatspay_pg_settlements_${startDate||'all'}_${endDate||'all'}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('PG 정산 CSV를 다운로드했습니다.');
  }catch(e){await adminAlert(e.message||'정산 다운로드에 실패했습니다.');}
}

async function setPgSettlementStatus(id,status,label){
  const s=D.pgSettlements.find(x=>String(x.id)===String(id));
  if(!s)return;
  try{
    const res=await fetch(`/api/pg/settlements/${encodeURIComponent(id)}/status`,{
      method:'PATCH',
      headers:adminAuthHeaders({'Content-Type':'application/json'}),
      body:JSON.stringify({status})
    });
    const json=await res.json().catch(()=>({}));
    if(await handleAdminUnauthorized(res))return;
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||`${label} 처리에 실패했습니다.`);
    await syncBackendTransactions({forceRender:true});
    renderPage();
    setTimeout(rGS,30);
    toast(label);
  }catch(e){await adminAlert(e.message||`${label} 처리에 실패했습니다.`);}
}

function ensureSettlementFilters(){
  if(role==='agent'){
    window._settleAgId=currentAgentAgencyId();
  }
  if(window._settleAgId===undefined)window._settleAgId='';
  if(!window._settleSd||!window._settleEd)setSettlementRange('thisMonth',false);
}
function setSettlementRange(type,rerender=true){
  const now=new Date();
  if(type==='lastMonth'){
    const start=new Date(now.getFullYear(),now.getMonth()-1,1);
    const end=new Date(now.getFullYear(),now.getMonth(),0);
    window._settleSd=start.toISOString().slice(0,10);
    window._settleEd=end.toISOString().slice(0,10);
  }else if(type==='all'){
    window._settleSd='2026-01-01';
    window._settleEd=today();
  }else{
    window._settleSd=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    window._settleEd=today();
  }
  if(rerender)renderPage();
}
function paymentFranchiseName(payment){
  const raw=String(payment?.franchise||'').trim();
  const byId=(D.franchises||[]).find(f=>String(f.id)===raw||String(f.id)===String(payment?.franchiseId||''));
  return byId?.name || raw || '-';
}
function paymentFranchise(payment){
  const raw=String(payment?.franchise||'').trim();
  return (D.franchises||[]).find(f=>String(f.id)===String(payment?.franchiseId||'')||String(f.id)===raw||f.name===raw)||null;
}
function agencyNameById(id){
  const ag=(D.agencies||[]).find(a=>String(a.id)===String(id||''));
  return ag?.name||'';
}
function paymentAgencyId(payment){
  if(payment?.agencyId!==undefined&&payment.agencyId!==null&&String(payment.agencyId).trim()!=='')return String(payment.agencyId);
  const raw=String(payment?.franchise||'').trim();
  const franchise=(D.franchises||[]).find(f=>String(f.id)===String(payment?.franchiseId||'')||String(f.id)===raw||f.name===raw);
  return franchise?.agencyId!==undefined&&franchise?.agencyId!==null?String(franchise.agencyId):'';
}
function paymentsForAgency(agId){
  const id=String(agId);
  return settlementFilteredPayments().filter(p=>paymentAgencyId(p)===id);
}
function settlementAgencyIds(){
  const selected=String(window._settleAgId||'');
  if(!selected)return null;
  const ids=[selected];
  const addChildren=(parentId)=>{
    (D.agencies||[]).filter(ag=>String(ag.parentId||'')===String(parentId)).forEach(ag=>{
      ids.push(String(ag.id));
      addChildren(ag.id);
    });
  };
  addChildren(selected);
  return ids;
}
function settlementFilteredPayments(){
  ensureSettlementFilters();
  const ids=settlementAgencyIds();
  return (D.payments||[]).filter(p=>{
    const d=dateOnly(p.date);
    if(window._settleSd&&d<window._settleSd)return false;
    if(window._settleEd&&d>window._settleEd)return false;
    if(ids&&ids.indexOf(paymentAgencyId(p))<0)return false;
    return true;
  });
}
function getAgencySettlementRows(){
  const r=Number(D.defaultFeeRate||4.4)/100;
  const ids=settlementAgencyIds();
  return (D.agencies||[]).filter(ag=>!ids||ids.indexOf(String(ag.id))>=0).map(ag=>{
    const pays=paymentsForAgency(ag.id);
    const amount=pays.reduce((sum,p)=>sum+Number(p.amount||0),0);
    const serviceFee=Math.round(amount*r);
    const merchantNet=amount-serviceFee;
    const rate=Number(getEffRate(ag)||0);
    const agencyFee=Math.round(amount*(rate/100));
    const agencyNet=Math.round(agencyFee*0.967);
    return{agency:ag,payments:pays,count:pays.length,amount,serviceFee,merchantNet,agencyFee,agencyNet,rate};
  }).sort((a,b)=>agencySortKey(a.agency).localeCompare(agencySortKey(b.agency)));
}
function agencyTypeLabel(ag){return ({bonbu:'본부',jisa:'지사',jijum:'지점'}[agencyTypeKey(ag)]||(`${ag?.level||'-'}단계`));}
function agencyTypePrefix(ag){return ({bonbu:'[본부]',jisa:'[지사]',jijum:'[지점]'}[agencyTypeKey(ag)]||`[${ag?.level||'-'}단계]`);}
function agencyIndentMark(depth){return depth===0?'→':depth===1?'└':'　└';}
function agencyTreeDepth(ag){
  let depth=0,current=ag,guard=0;
  while(current?.parentId&&guard<10){
    depth+=1;
    current=(D.agencies||[]).find(item=>String(item.id)===String(current.parentId));
    guard+=1;
  }
  return depth;
}
function agencySortKey(ag){
  const rank={bonbu:0,jisa:1,jijum:2}[agencyTypeKey(ag)]??9;
  const path=[];
  let current=ag,guard=0;
  while(current&&guard<10){
    const currentRank={bonbu:0,jisa:1,jijum:2}[agencyTypeKey(current)]??9;
    path.unshift(`${currentRank}-${String(current.name||current.id).padStart(4,'0')}`);
    current=(D.agencies||[]).find(item=>String(item.id)===String(current.parentId));
    guard+=1;
  }
  return `${rank}/${path.join('/')}/${String(ag.id).padStart(5,'0')}`;
}
function xlsEscape(v){
  return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

  const html=`<!doctype html><html><head><meta charset="UTF-8"></head><body>

    <table border="1"><thead><tr><th>지점명</th><th>유형</th><th>전체건</th><th>전체금액</th><th>가맹입금액</th><th>가맹입금수수료</th><th>영업계약수수료액</th><th>영업지급예정액</th><th>실지급액</th><th>입금은행</th><th>계좌번호</th></tr></thead><tbody>${summary}</tbody></table>
    <br>
    <table border="1"><thead><tr><th>대리점명</th><th>거래일시</th><th>승인번호</th><th>가맹점</th><th>결제금액</th><th>가맹입금액</th><th>가맹입금수수료</th><th>영업수수료</th><th>실지급액</th></tr></thead><tbody>${details}</tbody></table>
  </body></html>`;
  const blob=new Blob(['\ufeff',html],{type:'application/vnd.ms-excel;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`eatspay_agency_settlement_${today()}.xls`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),500);

function franchisePaymentDateForCard(f,card){
  if(!card)return'';
  const cardLast=String(card.cardLast4||card.maskedNumber||card.cardNumber||'').replace(/[^0-9]/g,'').slice(-4);
  if(!cardLast)return'';
  const cardName=normalizeCardMatchName(card.cardCompany||card.cardName||card.alias||'');
  const payments=(D.payments||[])
    .filter(p=>String(p.franchiseId||'')===String(f.id)||paymentFranchiseName(p)===f.name)
    .map(payment=>({
      date:dateOnly(payment.date||payment.createdAt||payment.paymentDate||''),
      last:String(payment.cardLast4||payment.maskedNumber||payment.cardNumber||'').replace(/[^0-9]/g,'').slice(-4),
      name:normalizeCardMatchName(payment.cardCompany||payment.cardName||payment.cardAlias||'')
    }))
    .filter(payment=>payment.date&&payment.last===cardLast);
  if(!payments.length)return'';
  const exact=payments.filter(payment=>payment.name&&cardName&&(payment.name===cardName||payment.name.includes(cardName)||cardName.includes(payment.name)));
  const cardSameLastCount=franchiseVisibleCardItems(f).filter(item=>String(item.cardLast4||item.maskedNumber||item.cardNumber||'').replace(/[^0-9]/g,'').slice(-4)===cardLast).length;
  const candidates=exact.length?exact:(cardSameLastCount===1?payments:[]);
  return candidates.map(payment=>payment.date).sort().pop()||'';
}

function resolveFranchisePaymentCardLabel(f,s,p){

    matched=matches.find(card=>rawName&&(card.name===rawName||card.name.includes(rawName)||rawName.includes(card.name)))||matches[0];

async function savF(id){
  clearFranchiseFormError();
  const n=v('fn').trim();
  if(!n){showFranchiseFormError('상점명을 입력하세요.','fn');return;}
  const bizDocInput=document.getElementById('fbizdoc');
  const bizDocFile=bizDocInput?.files?.[0]||null;
  const payload={
    loginId:v('flogin').trim(),
    email:v('fe').trim(),
    password:adminPasswordValue('fpw'),
    name:n,
    owner:v('fo').trim(),
    phone:v('fp').trim(),
    bizNo:v('fb2').trim(),
    address:v('faddr').trim(),
    tel:v('fdetailaddr').trim(),
    agencyId:v('fagencyid'),
    feeRate:v('ffee').trim(),
    deliveryAccounts:[]
  };
  if(!payload.owner){showFranchiseFormError('대표자명을 입력하세요.','fo');return;}
  if(!payload.bizNo){showFranchiseFormError('사업자등록번호를 입력하세요.','fb2');return;}
  if(!payload.email){showFranchiseFormError('이메일을 입력하세요.','fe');return;}
  if(!payload.loginId){showFranchiseFormError('로그인 ID를 입력하세요.','flogin');return;}
  if(!id&&!payload.password){showFranchiseFormError('비밀번호를 입력하세요.','fpw');return;}
  if(payload.feeRate&&(!Number.isFinite(Number(payload.feeRate))||Number(payload.feeRate)<0||Number(payload.feeRate)>=100)){showFranchiseFormError('수수료율은 0 이상 100 미만으로 입력해 주세요.','ffee');return;}
  try{
    for(const a of editingAgencies){
      if(a.proofFile){
        const uploaded=await uploadDAProofFile(a.proofFile);
        a.fileKey=uploaded.fileKey||'';
        a.fileName=uploaded.fileName||a.proofFile.name||a.fileKey||'';
        delete a.proofFile;
      }
    }
    payload.deliveryAccounts=editingAgencies.map(a=>({
      agencyName:a.agency,
      bankName:a.bankName||a.agency,
      accountHolder:v('fo').trim(),
      accountNo:a.accountNo,
      fileKey:a.fileKey||null
    })).filter(a=>a.agencyName&&a.accountNo);
    const res=await fetch(id?`/api/admin/franchises/${encodeURIComponent(id)}`:'/api/admin/franchises',{
      method:id?'PUT':'POST',
      headers:adminAuthHeaders({'Content-Type':'application/json'}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code?` [${err.error.code}]`:'';
      throw new Error((err.error?.message||err.message||'가맹점 수정에 실패했습니다.')+code);
    }
    const json=await res.json().catch(()=>({}));
    const savedId=json.data?.id||id;
    let uploadedBizDoc='';
    if(savedId&&bizDocFile){
      const fd=new FormData();
      fd.append('file',bizDocFile);
      const uploadRes=await fetch(`/api/franchise/${encodeURIComponent(savedId)}/biz-doc`,{
        method:'POST',
        headers:adminAuthHeaders(),
        body:fd
      });
      const uploadJson=await uploadRes.json().catch(()=>({}));
      if(await handleAdminUnauthorized(uploadRes))return;
      if(!uploadRes.ok||!uploadJson.success)throw new Error(uploadJson.error?.message||uploadJson.message||'사업자등록증 업로드에 실패했습니다.');
      uploadedBizDoc=uploadJson.data?.bizDocFile||'';
    }
    if(json.data){
      const idx=D.franchises.findIndex(x=>String(x.id)===String(json.data.id||id));
      const merged={
        ...(idx>=0?D.franchises[idx]:{}),
        ...json.data,
        id:json.data.id||id,
        email:json.data.email||payload.email,
        loginId:json.data.loginId||payload.loginId,
        contactEmail:json.data.contactEmail||payload.email,
        agencyId:json.data.agencyId||payload.agencyId,
        agency:json.data.agency||(D.agencies||[]).find(a=>String(a.id)===String(payload.agencyId))?.name||'',
        deliveryAgencies:json.data.deliveryAgencies||editingAgencies,
        tel:json.data.tel||payload.tel,
        bizDocFile:uploadedBizDoc||json.data.bizDocFile||json.data.bizDocFileKey||(idx>=0?D.franchises[idx]?.bizDocFile:'')
      };
      if(idx>=0)D.franchises[idx]=merged;
      else D.franchises.unshift(merged);
      save();
    }
    await syncBackendTransactions();
    closeM();
    render();
    toast(id?'가맹점 정보가 수정되었습니다.':'가맹점이 추가되었습니다.');
  }catch(e){
    console.error(e);
    showFranchiseFormError(e.message||'가맹점 저장에 실패했습니다.');
  }
}
async function delF(id){
  const f=D.franchises.find(x=>String(x.id)===String(id));
  if(!f){await adminAlert('삭제할 가맹점을 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const realPaymentCount=Number(f.realPaymentCount??f.paymentCount??0);
  if(realPaymentCount>0){
    await adminAlert('결제 내역이 있는 가맹점은 삭제할 수 없습니다.\n정산 및 결제 기록 보존을 위해 상태 변경으로 관리해주세요.','가맹점 삭제 불가');
    return;
  }
  if(!await adminConfirm(`'${f.name}'을 삭제하시겠습니까?\n결제 내역이 없는 가맹점만 삭제할 수 있습니다.\n이 작업은 되돌릴 수 없습니다.`,'가맹점 삭제'))return;
  try{
    const res=await fetch(`/api/admin/franchises/${encodeURIComponent(id)}`,{method:'DELETE',headers:adminAuthHeaders()});
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code?` [${err.error.code}]`:'';
      throw new Error((err.error?.message||err.message||'가맹점 삭제에 실패했습니다.')+code);
    }
    await syncBackendTransactions({forceRender:true});
    setTimeout(rFr,50);
    toast('가맹점이 삭제되었습니다.');
  }catch(e){
    console.error(e);
    await adminAlert(e.message||'가맹점 삭제에 실패했습니다.');
  }
}

async function exportApprovedAccounts(){
  try{
    const res=await fetch('/api/admin/account-approvals/export.xlsx',{headers:adminAuthHeaders(),cache:'no-store'});
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||err.message||'내보낼 승인 계좌가 없습니다.');
    }
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const batch=res.headers.get('X-Export-Batch-Id')||new Date().toISOString().slice(0,10).replace(/-/g,'');
    a.href=url;
    a.download=`계좌승인_내보내기_${batch}.xlsx`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await syncBackendTransactions();
    renderPage();
    toast('승인 계좌 내보내기 완료');
  }catch(e){
    await adminAlert(e.message||'내보내기에 실패했습니다.');
  }
}

function agencyTypeKey(a){
  const raw=String(a?.type||'').toLowerCase();
  if(raw==='hq'||raw==='head'||raw==='bonbu')return 'bonbu';
  if(raw==='branch'||raw==='jisa')return 'jisa';
  if(raw==='office'||raw==='agency'||raw==='jijum')return Number(a?.level||0)>=3?'jijum':'jisa';
  const lv=Number(a?.level||0);
  if(lv<=1)return 'bonbu';
  if(lv===2)return 'jisa';
  return 'jijum';
}

function agencyParentName(a){const p=(D.agencies||[]).find(x=>String(x.id)===String(a?.parentId||''));return p?p.name:'';}
function agencyChildren(id){return (D.agencies||[]).filter(x=>String(x.parentId||'')===String(id));}
function agencySubtreeIds(id){
  const ids=[String(id)];
  const walk=pid=>agencyChildren(pid).forEach(ch=>{ids.push(String(ch.id));walk(ch.id);});
  walk(id);
  return ids;
}
function agencyChain(a){
  const chain=[];let cur=a,guard=0;
  while(cur&&guard<20){chain.unshift(cur);cur=(D.agencies||[]).find(x=>String(x.id)===String(cur.parentId||''));guard+=1;}
  return chain;
}
function agencyTreeRows(){
  const all=[...(D.agencies||[])];
  const byParent=new Map();
  const byId=new Map(all.map(a=>[String(a.id),a]));
  all.forEach(a=>{
    const parentId=String(a.parentId||'');
    if(!byParent.has(parentId))byParent.set(parentId,[]);
    byParent.get(parentId).push(a);
  });
  const sortNodes=nodes=>nodes.sort((a,b)=>{
    const rankA={bonbu:0,jisa:1,jijum:2}[agencyTypeKey(a)]??9;
    const rankB={bonbu:0,jisa:1,jijum:2}[agencyTypeKey(b)]??9;
    if(rankA!==rankB)return rankA-rankB;
    return String(a.name||a.id).localeCompare(String(b.name||b.id),'ko')||String(a.id).localeCompare(String(b.id));
  });
  byParent.forEach(sortNodes);
  const roots=sortNodes(all.filter(a=>!a.parentId||!byId.has(String(a.parentId))||agencyTypeKey(a)==='bonbu'));
  const rows=[],seen=new Set();
  const walk=node=>{
    const id=String(node.id);
    if(seen.has(id))return;
    seen.add(id);
    rows.push(node);
    (byParent.get(id)||[]).forEach(walk);
  };
  roots.forEach(walk);
  all.filter(a=>!seen.has(String(a.id))).sort((a,b)=>agencySortKey(a).localeCompare(agencySortKey(b))).forEach(walk);
  return rows;
}
function agencyTreeRowsWithFranchises(){
  const rows=[];
  agencyTreeRows().forEach(a=>{
    rows.push({...a,_nodeType:'agency'});
    agencyFranchises(a.id,false)
      .sort((x,y)=>String(x.name||x.id).localeCompare(String(y.name||y.id),'ko'))
      .forEach(f=>rows.push({
        ...f,
        _nodeType:'franchise',
        parentId:a.id,
        parentName:a.name,
        type:'FRANCHISE',
        level:Number(a.level||1)+1
      }));
  });
  return rows;
}

async function downloadAgencyJoinQr(url,fileName='eats-pay-join-qr.png'){
  const qr=agencyQrImageUrl(url,1024);
  try{
    const res=await fetch(qr);
    if(!res.ok)throw new Error('QR 다운로드 실패');
    const blob=await res.blob();
    const objectUrl=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=objectUrl;
    a.download=fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(objectUrl),1000);
  }catch(e){
    window.open(qr,'_blank','noopener');
    toast('QR 이미지를 새 창으로 열었습니다.');
  }
}

    const blob=await res.blob();
    const file=new File([blob],fileName,{type:'image/png'});

  }
}

async function uploadAgencyContract(agencyId){

function clearAgencySettleAccountWarning(){
  ['asb','asa','ash'].forEach(id=>{
    const el=document.getElementById(id);

    el.style.background='';

  if(warning)warning.style.display='none';

function markAgencySettleAccountFields(){
  const ids=['asb','asa','ash'];
  const missing=ids.filter(id=>!v(id).trim());
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const isMissing=missing.includes(id);
    el.style.borderColor=isMissing?'#EF4444':'';
    el.style.background=isMissing?'#FFF7F7':'';
    if(isMissing)el.setAttribute('aria-invalid','true');
    else el.removeAttribute('aria-invalid');
  });
  const warning=document.getElementById('agency-settle-warning');
  if(warning)warning.style.display=missing.length?'block':'none';
  if(missing.length)document.getElementById(missing[0])?.focus();
}
async function saveAgencySettleAccount(agencyId){
  const bankName=v('asb').trim();
  const accountNo=v('asa').trim();
  const accountHolder=v('ash').trim();
  if(!bankName&&!accountNo&&!accountHolder)return false;
  if(!bankName||!accountNo||!accountHolder){
    markAgencySettleAccountFields();
    toast('정산 계좌는 은행, 계좌번호, 예금주를 모두 입력해야 저장됩니다. 기본 정보만 저장합니다.');
    return false;
  }
  const fd=new FormData();
  fd.append('bankName',bankName);
  fd.append('accountNo',accountNo);
  fd.append('accountHolder',accountHolder);
  const res=await fetch(`/api/agency/${encodeURIComponent(agencyId)}/settle-account`,{method:'POST',headers:adminAuthHeaders(),body:fd});
  if(await handleAdminUnauthorized(res))return null;
  const json=await res.json().catch(()=>({}));
  if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'정산 계좌 저장에 실패했습니다.');
  return json.data||true;
}
function mergeAgencyData(agency){
  if(!agency||!agency.id)return;
  const idx=(D.agencies||[]).findIndex(x=>String(x.id)===String(agency.id));
  const normalized={...agency,region:agency.region||agency.address||'',address:agency.address||agency.region||''};
  if(idx>=0)D.agencies[idx]={...D.agencies[idx],...normalized};
  else D.agencies=[...(D.agencies||[]),normalized];
  save();
}

async function savAg(id,triggerBtn){
  const btn=triggerBtn||document.querySelector('[data-ag-save].bg2')||document.activeElement?.closest?.('.btn')||null;
  const prevText=btn?.textContent||'저장';
  ['an','ai','apw'].forEach(clearAgencyField);
  const n=v('an');if(!n.trim()){markAgencyField('an');await adminAlert('대리점명을 입력해주세요.');return;}
  const type=v('atype')||'jisa';
  const data={name:n.trim(),loginId:v('ai'),type,level:agencyLevelFromType(type),region:v('ar'),owner:v('ao'),phone:v('ap'),feeRate:parseFloat(v('af'))||4.2,deliveryNote:v('agdn'),parentId:v('aparent')||null,password:adminPasswordValue('apw')};
  if(!id&&!data.loginId){markAgencyField('ai');await adminAlert('신규 대리점은 로그인 ID가 필요합니다.');return;}
  if(!id&&!data.password){markAgencyField('apw');await adminAlert('신규 대리점은 비밀번호가 필요합니다.');return;}
  try{
    if(btn){btn.disabled=true;btn.textContent='저장 중...';}
    const res=await fetch(id?`/api/admin/agencies/${encodeURIComponent(id)}`:'/api/admin/agencies',{method:id?'PATCH':'POST',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify(data)});
    if(await handleAdminUnauthorized(res))return;
    const json=await res.json().catch(()=>({}));
    if(!res.ok){throw new Error(json.error?.message||json.message||'대리점 저장에 실패했습니다.');}
    const savedId=id||json.data?.id;
    if(json.data)mergeAgencyData(json.data);
    if(savedId){
      const settleData=await saveAgencySettleAccount(savedId);
      if(settleData&&settleData!==true)mergeAgencyData({
        id:savedId,
        settleBankName:settleData.settleBankName||settleData.settle_bank_name||v('asb').trim(),
        settleAccountNo:settleData.settleAccountNo||settleData.settle_account_no||v('asa').trim(),
        settleAccountHolder:settleData.settleAccountHolder||settleData.settle_account_holder||v('ash').trim()
      });
    }
    if(savedId)await uploadAgencyContract(savedId);
    closeM();toast(id?'대리점이 수정되었습니다.':'대리점이 생성되었습니다.');
    await syncBackendTransactions({forceRender:false,silent:true});
    renderPage();
  }catch(e){await adminAlert(e.message||'대리점 저장에 실패했습니다.');}
  finally{if(btn){btn.disabled=false;btn.textContent=prevText;}}
}

async function delAg(id){
  const a=D.agencies.find(x=>String(x.id)===String(id));
  if(!a){await adminAlert('삭제할 대리점을 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const childCount=(D.agencies||[]).filter(x=>String(x.parentId||'')===String(id)).length;
  const franchiseCount=(D.franchises||[]).filter(x=>String(x.agencyId||'')===String(id)||x.agency===a.name).length;
  let msg=`'${a.name}' 대리점을 삭제하시겠습니까?`;
  if(childCount||franchiseCount){
    msg+=`\n하위 대리점 ${childCount}개, 연결 가맹점 ${franchiseCount}개는 대리점 연결이 해제됩니다.`;
  }
  msg+='\n이 작업은 되돌릴 수 없습니다.';
  if(!await adminConfirm(msg,'대리점 삭제'))return;
  try{
    const res=await fetch(`/api/admin/agencies/${encodeURIComponent(id)}`,{method:'DELETE',headers:adminAuthHeaders()});
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code?` [${err.error.code}]`:'';
      throw new Error((err.error?.message||err.message||'대리점 삭제에 실패했습니다.')+code);
    }

function daSortState(){
  if(!window._daSort)window._daSort={key:'sortOrder',dir:'asc'};
  return window._daSort;
}
function setDASort(key){
  const cur=daSortState();
  window._daSort={key,dir:cur.key===key&&cur.dir==='asc'?'desc':'asc'};
  renderPage();
}
function daSortHeader(key,label){
  const cur=daSortState();
  const mark=cur.key===key?(cur.dir==='asc'?' ▲':' ▼'):' ↕';
  return `<button type="button" class="admin-table-sort-btn" data-da-sort="${esc(key)}">${label}${mark}</button>`;
}
function sortedDeliveryAgencyList(){
  const cur=daSortState();
  const getVal=(a)=>{
    if(cur.key==='logo')return a.logoUrl?'1':'0';
    if(cur.key==='name')return a.name||'';
    if(cur.key==='corp')return a.corporationName||'';
    if(cur.key==='bizno')return a.businessNumber||'';
    if(cur.key==='status')return a.status||'';
    if(cur.key==='usage')return deliveryAgencyUsageCount(a);
    if(cur.key==='statusChange')return a.status==='active'?'가입 불가로':'가입 가능으로';
    if(cur.key==='file')return deliveryAgencyBusinessDisplayName(a);
    if(cur.key==='delete')return Number(a.id)||0;
    return Number(a.sortOrder||0);
  };
  return getAllDA().slice().sort((a,b)=>{
    const av=getVal(a),bv=getVal(b);
    let cmp=typeof av==='number'&&typeof bv==='number'?av-bv:String(av).localeCompare(String(bv),'ko');
    if(cmp===0)cmp=String(a.name||'').localeCompare(String(b.name||''),'ko');
    return cur.dir==='desc'?-cmp:cmp;
  });
}

async function uploadDeliveryAgencyBusinessFile(id,file=null,opts={}){
  const a=D.deliveryAgencyList.find(x=>String(x.id)===String(id));
  if(!a){await adminAlert('배달대행사를 찾을 수 없습니다.');return;}
  const selected=file||await new Promise(resolve=>{
    const input=document.createElement('input');
    input.type='file';input.accept='application/pdf,.pdf';
    input.addEventListener('change',()=>resolve(input.files?.[0]||null),{once:true});
    input.click();
  });
  if(!selected)return;
  if(!/\.pdf$/i.test(selected.name||'')&&selected.type!=='application/pdf'){await adminAlert('사업자등록증은 PDF 파일만 등록할 수 있습니다.');return;}
  try{
    const fd=new FormData();fd.append('file',selected);
    const res=await fetch(`/api/admin/delivery-agencies/${encodeURIComponent(id)}/business-file`,{method:'POST',headers:adminAuthHeaders(),body:fd});
    if(await handleAdminUnauthorized(res))return;
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'사업자등록증 PDF 업로드에 실패했습니다.');
    const fresh=D.deliveryAgencyList.find(x=>String(x.id)===String(id));
    if(fresh){
      fresh.businessFileKey=json.data?.businessFile||fresh.businessFileKey||'';

  <div class="fg"><label class="fl">본문 *</label><textarea class="fta" id="ld-content" rows="14" placeholder="앱에 표시할 내용을 입력하세요."></textarea></div>
  <label class="ci admin-strong-green"><input type="checkbox" id="ld-applied"> 저장 즉시 앱에 적용</label>`;}
function normalizeLegalDocText(fileName,text){
  const ext=String(fileName||'').split('.').pop().toLowerCase();
  const normalizeMarkdown=value=>String(value||'')
    .replace(/\r\n/g,'\n')
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/^#{1,6}\s*/gm,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/__([^_]+)__/g,'$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
    .replace(/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/gm,'')
    .replace(/^\s*\|(.+)\|\s*$/gm,(match,row)=>row.split('|').map(cell=>cell.trim()).filter(Boolean).join('  '))
    .replace(/^\s*\|\s*/gm,'')
    .replace(/\s*\|\s*$/gm,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
  if(ext==='html'||ext==='htm'){
    const doc=new DOMParser().parseFromString(text,'text/html');
    return (doc.body?.innerText||text).trim();
  }
  if(ext==='rtf'){
    return text
      .replace(/\\par[d]?/g,'\n')
      .replace(/\\'[0-9a-fA-F]{2}/g,'')
      .replace(/\\[a-zA-Z]+-?\d* ?/g,'')
      .replace(/[{}]/g,'')
      .replace(/\n{3,}/g,'\n\n')
      .trim();
  }
  if(ext==='md'||ext==='markdown')return normalizeMarkdown(text);
  return String(text||'').replace(/<br\s*\/?>/gi,'\n').trim();
}
async function readLegalDocFile(file){
  const name=String(file?.name||'');
  const ext=name.split('.').pop().toLowerCase();
  const supported=['txt','md','markdown','html','htm','rtf'];
  const blocked=['pdf','doc','docx','hwp','hwpx'];
  if(blocked.includes(ext)){
    throw new Error(`${name} 파일은 자동으로 본문을 추출할 수 없습니다.\n파일을 열어서 내용을 복사한 뒤 본문 칸에 붙여넣어 주세요.`);
  }
  if(ext&&!supported.includes(ext)){
    throw new Error('지원하지 않는 파일 형식입니다. txt, md, html, rtf 파일만 불러올 수 있습니다.');
  }
  if(file.size>8*1024*1024){
    throw new Error('파일 용량이 너무 큽니다. 8MB 이하의 md/txt 파일로 나누어 등록해 주세요.');
  }
  const raw=await file.text();
  const text=normalizeLegalDocText(name,raw);
  if(!text)throw new Error('파일에서 읽을 수 있는 본문이 없습니다. 내용을 직접 입력해 주세요.');
  return text;
}

function upsertLegalDocLocal(doc){
  if(!doc||!doc.id)return;

  const idx=D.legalDocuments.findIndex(item=>String(item.id)===String(doc.id));
  if(idx>=0)D.legalDocuments[idx]={...D.legalDocuments[idx],...doc};
  else D.legalDocuments.unshift(doc);

    await adminAlert('개인정보처리방침 파일은 왼쪽 개인정보처리방침 영역의 [+ 새 문서 등록]에서 등록해 주세요.');

    const json=await res.json().catch(()=>({}));

function startFaqColumnResize(ev,key){

  const startX=ev.clientX,startW=th.offsetWidth;
  const move=e=>{adminTableResizingUntil=Date.now()+700;const w=Math.max(90,startW+(e.clientX-startX));th.style.width=w+'px';};
  const up=()=>{adminTableResizingUntil=Date.now()+700;const widths=getFaqColumnWidths();widths[key]=th.offsetWidth;localStorage.setItem(ADMIN_FAQ_COL_WIDTH_KEY,JSON.stringify(widths));document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};

}

async function dropFaqDrag(ev,targetId){
  ev.preventDefault();const tr=ev.target.closest?.('[data-faq-row]')||ev.currentTarget;tr?.classList?.remove('drag-over');
  const fromId=String(faqDragId||ev.dataTransfer?.getData('text/plain')||''),toId=String(targetId||'');if(!fromId||fromId===toId)return;
  const items=D.faqs.filter(f=>f.category===faqTab).sort((a,b)=>(Number(a.displayOrder||0)-Number(b.displayOrder||0))||(Number(a.id||0)-Number(b.id||0)));
  const fromIdx=items.findIndex(x=>String(x.id)===fromId),toIdx=items.findIndex(x=>String(x.id)===toId);
  if(fromIdx<0||toIdx<0)return;
  const [moved]=items.splice(fromIdx,1);items.splice(toIdx,0,moved);
  await saveFaqItemOrder(items,'FAQ 순서가 저장되었습니다.');

async function renameFaqCat(){
  const oldCategory=faqTab;
  if(!oldCategory){await adminAlert('수정할 탭이 없습니다.');return;}
  const next=await adminPrompt('변경할 탭 이름:',oldCategory);
  const newCategory=String(next||'').trim();
  if(!newCategory||newCategory===oldCategory)return;
  if(D.faqs.some(f=>f.category===newCategory)){
    await adminAlert('이미 같은 이름의 FAQ 탭이 있습니다.');
    return;
  }
  try{
    const res=await fetch('/api/admin/faqs/category',{method:'PATCH',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify({oldCategory,newCategory})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'FAQ 탭 이름 변경에 실패했습니다.');
    faqTab=newCategory;await syncBackendTransactions({forceRender:true});toast('FAQ 탭 이름이 변경되었습니다.');
  }catch(e){await adminAlert(e.message||'FAQ 탭 이름 변경에 실패했습니다.');}
}
async function delFaqCat(){
  const category=faqTab;
  if(!category){await adminAlert('삭제할 탭이 없습니다.');return;}
  const count=D.faqs.filter(f=>f.category===category).length;
  if(!await adminConfirm(`'${category}' 탭을 삭제하시겠습니까?\n이 탭의 FAQ ${count}건도 함께 삭제됩니다.`))return;
  try{
    const res=await fetch(`/api/admin/faqs/category/${encodeURIComponent(category)}`,{method:'DELETE',headers:adminAuthHeaders()});
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'FAQ 탭 삭제에 실패했습니다.');
    const remaining=D.faqs.filter(f=>f.category!==category);
    faqTab=[...new Set(remaining.map(f=>f.category))][0]||'서비스 안내';
    await syncBackendTransactions({forceRender:true});toast('FAQ 탭이 삭제되었습니다.');
  }catch(e){await adminAlert(e.message||'FAQ 탭 삭제에 실패했습니다.');}
}

  const a=v('pa').trim()||'운영팀';
  try{
    const res=await fetch(id?`/api/admin/boards/${t}/${encodeURIComponent(id)}`:`/api/admin/boards/${t}`,{method:id?'PATCH':'POST',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify({title:ti,author:a,content:c})});

}

    const res=await fetch(`/api/admin/boards/${t}/${encodeURIComponent(id)}`,{method:'DELETE',headers:adminAuthHeaders()});

    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'게시글 삭제에 실패했습니다.');

async function savAdm(id){
  const loginId=v('adi').trim();
  const n=v('adn').trim();
  const p=adminPasswordValue('adp'),p2=adminPasswordValue('adp2');
  if(!loginId||!n){await adminAlert('로그인 아이디와 이름을 입력하세요.');return;}
  if(!id&&!p){await adminAlert('비밀번호를 입력하세요.');return;}
  if(p&&p.length<8){await adminAlert('관리자 비밀번호는 8자 이상으로 입력해주세요.');return;}
  if((p||p2)&&p!==p2){await adminAlert('비밀번호 불일치');return;}
  const adminPermissions=collectAdminPermissions();
  if(!adminPermissions.length){await adminAlert('접근 가능한 메뉴를 1개 이상 선택하세요.');return;}
  try{
    const body={loginId,name:n,adminLevel:v('adr'),adminPermissions};
    if(p)body.password=p;
    const res=await fetch(id?`/api/admin/admins/${encodeURIComponent(id)}`:'/api/admin/admins',{method:id?'PATCH':'POST',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify(body)});
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'관리자 계정 저장에 실패했습니다.');
    closeM();await syncBackendTransactions({forceRender:true});toast(id?'관리자 계정이 수정되었습니다.':'관리자 계정이 생성되었습니다.');
  }catch(e){await adminAlert(e.message||'관리자 계정 저장에 실패했습니다.');}
}
async function delAdm(id){
  if(D.admins.length<=1){await adminAlert('최소 1명 필요');return;}
  if(!await adminConfirm('이 관리자 계정을 삭제하시겠습니까?'))return;
  try{
    const res=await fetch(`/api/admin/admins/${encodeURIComponent(id)}`,{method:'DELETE',headers:adminAuthHeaders()});
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'관리자 계정 삭제에 실패했습니다.');
    await syncBackendTransactions({forceRender:true});toast('관리자 계정이 삭제되었습니다.');
  }catch(e){await adminAlert(e.message||'관리자 계정 삭제에 실패했습니다.');}
}

function normalizeInstallmentCursor(){
  if(!window._instYear)window._instYear=INSTALLMENT_MIN_YEAR;
  if(!window._instMonth)window._instMonth=INSTALLMENT_MIN_MONTH;
  if(window._instYear<INSTALLMENT_MIN_YEAR||(window._instYear===INSTALLMENT_MIN_YEAR&&window._instMonth<INSTALLMENT_MIN_MONTH)){
    window._instYear=INSTALLMENT_MIN_YEAR;
    window._instMonth=INSTALLMENT_MIN_MONTH;
  }
}
function installmentPolicyMonth(){
  normalizeInstallmentCursor();

}
async function loadInstallmentsForCursor(options={}){

    if(await handleAdminUnauthorized(res))return;
    if(!res.ok)throw new Error('무이자 할부 설정을 불러오지 못했습니다.');
    const json=await res.json();
    D.installments=Array.isArray(json.data)?json.data:[];

  }
}
async function moveInstallmentMonth(delta){
  normalizeInstallmentCursor();
  let y=window._instYear;
  let m=window._instMonth+delta;
  if(m<1){m=12;y-=1;}
  if(m>12){m=1;y+=1;}
  if(y<INSTALLMENT_MIN_YEAR||(y===INSTALLMENT_MIN_YEAR&&m<INSTALLMENT_MIN_MONTH)){
    toast('2026년 6월 이전 데이터는 이동할 수 없습니다.');
    y=INSTALLMENT_MIN_YEAR;

  window._instMonth=m;

  await loadInstallmentsForCursor();
}

async function syncBackendFranchises() {

    if(!await ensureAdminLogin())return;

async function syncBackendTransactions(options={}) {
  const forceRender=!!options.forceRender;
  const silent=!!options.silent;
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch(`/api/admin/bootstrap?_=${Date.now()}`, {
      headers: adminAuthHeaders(),
      cache: 'no-store'
    });
    if(await handleAdminUnauthorized(res))return syncBackendTransactions();
    if (!res.ok) {
      D.franchises = [];
      D.payments = [];
      D.pgSettlements = [];
      D.summary = {};
      save();
      return;
    }
    const json = await res.json();
    const data = json.data || {};
    D.franchises = Array.isArray(data.franchises) ? data.franchises : [];
    D.agencies = Array.isArray(data.agencies) ? data.agencies : D.agencies;
    D.deliveryAgencyList = Array.isArray(data.deliveryAgencies) ? data.deliveryAgencies : D.deliveryAgencyList;
    D.installments = Array.isArray(data.installments) ? data.installments : [];
    D.faqs = Array.isArray(data.faqs) ? data.faqs : [];
    D.legalDocuments = Array.isArray(data.legalDocuments) ? data.legalDocuments : [];
    D.notices = Array.isArray(data.notices) ? data.notices : [];
    D.guides = Array.isArray(data.guides) ? data.guides : [];
    D.admins = Array.isArray(data.admins) ? data.admins : [];
    D.pgProviders = Array.isArray(data.pgProviders) ? data.pgProviders : [];
    D.inquiries = Array.isArray(data.inquiries) ? data.inquiries : [];
    D.banners = Array.isArray(data.banners) ? data.banners : [];
    D.customRoles = Array.isArray(data.customRoles) && data.customRoles.length ? data.customRoles : null;
    D.summary = data.summary && typeof data.summary === 'object' ? data.summary : {};
    D.payments = Array.isArray(data.payments) ? data.payments : [];
    D.pgSettlements = Array.isArray(data.pgSettlements) ? data.pgSettlements : [];
    const nextSnapshot=makeBackendSnapshot();
    const changed=nextSnapshot!==backendSnapshot;
    backendSnapshot=nextSnapshot;
    save();
    if((changed||forceRender)&&!silent){
      render();
    }
    return changed;
  } catch (e) {
    console.error("Failed to sync backend transactions:", e);
    D.franchises = [];
    D.payments = [];
    D.pgSettlements = [];
    D.summary = {};
    save();
  }
}

async function syncBackendAccounts() {
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch('/api/admin/accounts', {
      headers: adminAuthHeaders()
    });
    if(await handleAdminUnauthorized(res))return syncBackendAccounts();
    if (!res.ok) return;
    const json = await res.json();
    const reqs = json.data || [];
    reqs.forEach(req => {
      const requestAccountNo = req.accountNo || req.assignedVirtualAccount?.accountNumber || '';
      if (!requestAccountNo) return;
      const f = D.franchises.find(x => x.bizNo === req.businessNumber || x.name === req.franchiseName);
      if (f) {
        if (!f.deliveryAgencies) f.deliveryAgencies = [];
        const exists = f.deliveryAgencies.some(da => (
          req.requestId && da.requestId === req.requestId
        ) || (
          req.accountNo && da.accountNo === req.accountNo
        ) || (
          req.documentUrl && da.documentUrl === req.documentUrl
        ));
        if (!exists) {
          f.deliveryAgencies.push({
            agency: req.deliveryAgencyName || req.bankName || (req.bankCode === '088' ? '신한은행' : '우리은행'),
            bankName: req.bankName || (req.bankCode === '088' ? '신한은행' : '우리은행'),
            bankCode: req.bankCode || '',
            accountNo: requestAccountNo,
            fileName: req.documentUrl ? req.documentUrl.split('/').pop() : '미첨부',
            documentUrl: req.documentUrl || '',
            accountStatus: req.status === 'PENDING' ? '승인대기' : (req.status === 'APPROVED' ? '승인완료' : '반려'),
            reqDate: req.submittedAt.slice(0, 10),
            requestId: req.requestId
          });
        }
      }
    });
    save();
    renderPage();
  } catch (e) {
    console.error("Failed to sync backend accounts:", e);
  }
}

async function approveAccount(fid,idx){
  const f=D.franchises.find(x=>String(x.id)===String(fid));
  if(!f||!f.deliveryAgencies||!f.deliveryAgencies[idx]){await adminAlert('계좌 요청 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const da=f.deliveryAgencies[idx];
  if(!await adminConfirm(`'${f.name}'의 ${da.agency} 계좌를 승인하시겠습니까?`))return;
  let requestId=da.requestId;
  if(!requestId){
    await syncBackendTransactions();
    const freshF=D.franchises.find(x=>String(x.id)===String(fid));
    const fresh=(freshF?.deliveryAgencies||[]).find(item=>item.accountStatus==='승인대기'&&(item.accountNo===da.accountNo||item.agency===da.agency));
    requestId=fresh?.requestId;
  }
  if(!requestId){await adminAlert('DB 승인 요청 ID가 없습니다. 화면을 새로고침한 뒤 다시 시도해주세요.');return;}

  try {
    const res=await fetch('/api/admin/accounts/approve', {
      method: 'POST',
      headers: {
        ...adminAuthHeaders(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        requestId,
        action: 'APPROVED',
        assignedVirtualAccount: {
          bankCode: da.bankCode || (da.bankName === '신한은행' ? '088' : '020'),
          bankName: da.bankName || da.agency,
          accountNumber: da.accountNo || `562-901-${Math.floor(100000 + Math.random() * 900000)}`,
          accountHolder: `(주)이츠페이_${f.name}`
        }
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||err.message||'계좌 승인 처리에 실패했습니다.');
    }
  } catch (e) {
    console.error(e);
    await adminAlert(e.message||'계좌 승인 처리에 실패했습니다.');
    return;
  }

  await syncBackendTransactions();
  closeM();
  render();
  toast(`${f.name} 계좌 승인 완료`);
}

    ev.preventDefault();
    ev.stopPropagation();
    addF();
    return;
  }
  const frClearTarget=ev.target.closest('[data-fr-clear-filter]');
  if(frClearTarget){
    ev.preventDefault();
    ev.stopPropagation();
    clearFrFilters();
    return;
  }
  const frSaveTarget=ev.target.closest('[data-fr-save]');
  if(frSaveTarget){
    ev.preventDefault();
    ev.stopPropagation();
    savF(frSaveTarget.dataset.frSaveId||undefined);
    return;
  }
  const frAddressTarget=ev.target.closest('[data-fr-address-search]');
  if(frAddressTarget){
    ev.preventDefault();
    ev.stopPropagation();
    openFranchiseAddressSearch();
    return;
  }
  const daProofPickTarget=ev.target.closest('[data-da-proof-pick]');
  if(daProofPickTarget){
    ev.preventDefault();
    ev.stopPropagation();
    document.getElementById('da-proof-'+daProofPickTarget.dataset.daProofPick)?.click();
    return;
  }
  const daRowRemoveTarget=ev.target.closest('[data-da-row-remove]');
  if(daRowRemoveTarget){
    ev.preventDefault();
    ev.stopPropagation();
    removeDARow(Number(daRowRemoveTarget.dataset.daRowRemove));
    return;
  }
  const frDaAddTarget=ev.target.closest('[data-fr-da-row-add]');
  if(frDaAddTarget){
    ev.preventDefault();
    ev.stopPropagation();
    addDARow();
    return;
  }
  const filePreviewTarget=ev.target.closest('[data-file-preview-key]');
  if(filePreviewTarget){
    ev.preventDefault();
    ev.stopPropagation();
    previewDeliveryAgencyBusinessFile(filePreviewTarget.dataset.filePreviewKey||'',filePreviewTarget.dataset.filePreviewName||'');
    return;
  }
  const frDeleteTarget=ev.target.closest('[data-fr-delete-id]');
  if(frDeleteTarget){
    ev.preventDefault();
    ev.stopPropagation();
    delF(frDeleteTarget.dataset.frDeleteId);
    return;
  }
  const cardAliasTarget=ev.target.closest('[data-fr-card-alias-save]');
  if(cardAliasTarget){
    ev.preventDefault();
    ev.stopPropagation();
    updateFranchiseCardAlias(cardAliasTarget.dataset.frId,cardAliasTarget.dataset.frCardAliasSave,cardAliasTarget);
    return;
  }
  const visibilityTarget=ev.target.closest('[data-fr-visibility-type]');
  if(visibilityTarget){
    ev.preventDefault();
    ev.stopPropagation();
    const type=visibilityTarget.dataset.frVisibilityType;
    const fid=visibilityTarget.dataset.frId;
    const targetId=visibilityTarget.dataset.frTargetId;
    const hidden=visibilityTarget.dataset.frHidden==='true';
    (async()=>{
      if(type==='card')await hideFranchiseCard(fid,targetId,hidden);
      if(type==='account')await hideManagedAccount(fid,Number(targetId),hidden);
      if(String(frDetailId||'')===String(fid)){
        goFrDetail(fid);
      }
    })();
    return;
  }
  const managedAccountSaveTarget=ev.target.closest('[data-managed-account-save]');
  if(managedAccountSaveTarget){
    ev.preventDefault();
    ev.stopPropagation();
    const fid=managedAccountSaveTarget.dataset.frId;
    const idx=Number(managedAccountSaveTarget.dataset.frAccountIdx);
    if(fid&&!Number.isNaN(idx))saveManagedAccount(fid,idx);
    return;
  }
  const accountDetailTarget=ev.target.closest('[data-fr-account-detail]');
  if(accountDetailTarget){
    ev.preventDefault();
    ev.stopPropagation();
    const fid=accountDetailTarget.dataset.frId;
    const idx=Number(accountDetailTarget.dataset.frAccountDetail);
    if(fid&&!Number.isNaN(idx))showAccountDetail(fid,idx);
    return;
  }
  const accountActionTarget=ev.target.closest('[data-fr-account-action]');
  if(accountActionTarget){
    ev.preventDefault();
    ev.stopPropagation();
    const fid=accountActionTarget.dataset.frId;
    const idx=Number(accountActionTarget.dataset.frAccountIdx);
    const action=accountActionTarget.dataset.frAccountAction;
    if(!fid||Number.isNaN(idx))return;
    (async()=>{
      if(action==='approve')await approveAccount(fid,idx);
      if(action==='reject')await rejectAccount(fid,idx);
      if(String(frDetailId||'')===String(fid)){
        goFrDetail(fid);
      }
    })();
    return;
  }
  const agListTarget=ev.target.closest('[data-ag-list]');
  if(agListTarget){
    ev.preventDefault();
    ev.stopPropagation();
    goAgList();
    return;
  }
  const agDeleteTarget=ev.target.closest('[data-ag-delete]');
  if(agDeleteTarget){
    ev.preventDefault();
    ev.stopPropagation();
    delAg(agDeleteTarget.dataset.agDelete);
    return;
  }
  const agSettlementTarget=ev.target.closest('[data-ag-settlement]');
  if(agSettlementTarget){
    ev.preventDefault();
    ev.stopPropagation();
    window._settleAgId=agSettlementTarget.dataset.agSettlement||'';
    page='settlements';
    renderNav();
    renderPage();
    return;
  }
  const editTarget=ev.target.closest('[data-ag-edit-id]');
  if(editTarget){
    ev.preventDefault();
    ev.stopPropagation();
    edAg(editTarget.dataset.agEditId);
    return;
  }
  const resetTarget=ev.target.closest('[data-ag-reset-id]');
  if(resetTarget){
    ev.preventDefault();
    ev.stopPropagation();
    resetAgencyPassword(resetTarget.dataset.agResetId);
    return;
  }
  const franchiseDetailTarget=ev.target.closest('[data-fr-detail-id]');
  if(franchiseDetailTarget){
    ev.preventDefault();
    ev.stopPropagation();
    const frId=franchiseDetailTarget.dataset.frDetailId||'';
    if(frId)location.href=`/admin?franchiseId=${encodeURIComponent(frId)}`;
    return;
  }
  const franchiseRowTarget=ev.target.closest('[data-fr-row-id]');
  if(franchiseRowTarget&&!ev.target.closest('button,a,input,select,textarea,label')){
    ev.preventDefault();
    ev.stopPropagation();
    const frId=franchiseRowTarget.dataset.frRowId||'';
    if(frId)location.href=`/admin?franchiseId=${encodeURIComponent(frId)}`;
    return;
  }
  const agencyRowTarget=ev.target.closest('[data-ag-row-id]');
  if(agencyRowTarget&&!ev.target.closest('button,a,input,select,textarea,label')){
    ev.preventDefault();
    ev.stopPropagation();
    const agId=agencyRowTarget.dataset.agRowId||'';
    if(agId)goAgDetail(agId);
    return;
  }
  const target=ev.target.closest('[data-ag-detail-id]');
  if(!target)return;
  ev.preventDefault();
  ev.stopPropagation();
  goAgDetail(target.dataset.agDetailId);
},true);

async function bootAdmin(){
  installAdminPageGuards();
  adminRuntimeToken=localStorage.getItem(ADMIN_TOKEN_KEY)||sessionStorage.getItem(ADMIN_TOKEN_KEY)||'';
  try{currentAdmin=JSON.parse(localStorage.getItem(ADMIN_USER_KEY)||'null')||null;}catch(_){currentAdmin=null;}
  applyCurrentAdminRole();
  load();
  await ensureAdminLogin();
  restoreFranchiseFilters();
  restoreAdminPage();
  await syncBackendTransactions({silent:true});
  render();
  startBackendMonitor();
}
bootAdmin();
</script>
</body>
</html>
