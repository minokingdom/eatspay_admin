async function syncBackendTransactions(options={}) {
  const forceRender=!!options.forceRender;
  const silent=!!options.silent;
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch(`/api/admin/bootstrap?_=${Date.now()}`, {
      headers: adminAuthHeaders(),
      cache: 'no-store'
    });
    if(await handleAdminUnauthorized(res))return syncBackendTransactions();
    if (!res.ok) {
      D.franchises = [];
      D.payments = [];
      D.pgSettlements = [];
      D.summary = {};
      save();
      return;
    }
    const json = await res.json();
    const data = json.data || {};
    D.franchises = Array.isArray(data.franchises) ? data.franchises : [];
    D.agencies = Array.isArray(data.agencies) ? data.agencies : D.agencies;
    D.banks = Array.isArray(data.banks) ? data.banks : D.banks;
    D.deliveryAgencyList = Array.isArray(data.deliveryAgencies) ? data.deliveryAgencies : D.deliveryAgencyList;
    D.installments = Array.isArray(data.installments) ? data.installments : [];
    D.faqs = Array.isArray(data.faqs) ? data.faqs : [];
    D.legalDocuments = Array.isArray(data.legalDocuments) ? data.legalDocuments : [];
    D.notices = Array.isArray(data.notices) ? data.notices : [];
    D.guides = Array.isArray(data.guides) ? data.guides : [];
    D.admins = Array.isArray(data.admins) ? data.admins : [];
    D.pgProviders = Array.isArray(data.pgProviders) ? data.pgProviders : [];
    D.inquiries = Array.isArray(data.inquiries) ? data.inquiries : [];
    D.banners = Array.isArray(data.banners) ? data.banners : [];
    D.customRoles = Array.isArray(data.customRoles) && data.customRoles.length ? data.customRoles : null;
    D.summary = data.summary && typeof data.summary === 'object' ? data.summary : {};
    D.payments = Array.isArray(data.payments) ? data.payments : [];
    D.pgSettlements = Array.isArray(data.pgSettlements) ? data.pgSettlements : [];
    const nextSnapshot=makeBackendSnapshot();
    const changed=nextSnapshot!==backendSnapshot;
    backendSnapshot=nextSnapshot;
    save();
    if((changed||forceRender)&&!silent){
      render();
    }
    return changed;
  } catch (e) {
    console.error("Failed to sync backend transactions:", e);
    D.franchises = [];
    D.payments = [];
    D.pgSettlements = [];
    D.summary = {};
    save();
  }
}

function startBackendMonitor(){
  if(backendPollTimer)clearInterval(backendPollTimer);
  backendPollTimer=setInterval(async()=>{
    if(document.hidden)return;
    await syncBackendTransactions();
  },3000);
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden)syncBackendTransactions();
  });
}

async function syncBackendAccounts() {
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch('/api/admin/accounts', {
      headers: adminAuthHeaders()
    });
    if(await handleAdminUnauthorized(res))return syncBackendAccounts();
    if (!res.ok) return;
    const json = await res.json();
    const reqs = json.data || [];
    reqs.forEach(req => {
      const requestAccountNo = req.accountNo || req.assignedVirtualAccount?.accountNumber || '';
      if (!requestAccountNo) return;
      const f = D.franchises.find(x => x.bizNo === req.businessNumber || x.name === req.franchiseName);
      if (f) {
        if (!f.deliveryAgencies) f.deliveryAgencies = [];
        const exists = f.deliveryAgencies.some(da => (
          req.requestId && da.requestId === req.requestId
        ) || (
          req.accountNo && da.accountNo === req.accountNo
        ) || (
          req.documentUrl && da.documentUrl === req.documentUrl
        ));
        if (!exists) {
          f.deliveryAgencies.push({
            agency: req.deliveryAgencyName || req.bankName || (req.bankCode === '088' ? '신한은행' : '우리은행'),
            bankName: req.bankName || (req.bankCode === '088' ? '신한은행' : '우리은행'),
            bankCode: req.bankCode || '',
            accountNo: requestAccountNo,
            fileName: req.documentUrl ? req.documentUrl.split('/').pop() : '미첨부',
            documentUrl: req.documentUrl || '',
            accountStatus: req.status === 'APPROVED' && String(req.txid || '').trim() ? '승인완료' : (req.status === 'REJECTED' ? '반려' : '승인대기'),
            approvalStatus: req.status,
            txid: req.txid || '',
            exportReadyAt: req.exportReadyAt || '',
            reqDate: req.submittedAt.slice(0, 10),
            requestId: req.requestId
          });
        }
      }
    });
    save();
    renderPage();
  } catch (e) {
    console.error("Failed to sync backend accounts:", e);
  }
}

async function approveAccount(fid,idx){
  const f=D.franchises.find(x=>String(x.id)===String(fid));
  if(!f||!f.deliveryAgencies||!f.deliveryAgencies[idx]){await adminAlert('계좌 요청 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const da=f.deliveryAgencies[idx];
  if(!await adminConfirm(`'${f.name}'의 ${da.agency} 계좌를 검증완료합니다.\n확인을 누르면 엑셀 내보내기 대상에 포함됩니다.`))return;
  let requestId=da.requestId;
  let ident=getManagedAccountIdentity(da);
  if(!requestId){
    await syncBackendTransactions();
    const freshF=D.franchises.find(x=>String(x.id)===String(fid));
    const fresh=(freshF?.deliveryAgencies||[]).find(item=>item.accountStatus==='승인대기'&&(item.accountNo===da.accountNo||item.agency===da.agency));
    requestId=fresh?.requestId;
    ident=fresh?getManagedAccountIdentity(fresh):ident;
  }
  if(!requestId&&!ident.id){await adminAlert('DB 계좌 ID가 없습니다. 화면을 새로고침한 뒤 다시 시도해주세요.');return;}

  try {
    const res=await fetch('/api/admin/accounts/approve', {
      method: 'POST',
      headers: {
        ...adminAuthHeaders(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        requestId,
        accountId: ident.id,
        source: ident.source,
        action: 'APPROVED',
        assignedVirtualAccount: {
          bankCode: da.bankCode || (da.bankName === '신한은행' ? '088' : '020'),
          bankName: da.bankName || da.agency,
          accountNumber: da.accountNo || `562-901-${Math.floor(100000 + Math.random() * 900000)}`,
          accountHolder: `(주)이츠페이_${f.name}`
        }
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code||err.code;
      throw new Error(code==='ALREADY_PROCESSED'?'이미 처리된 계좌 요청입니다. 화면을 새로고침해 최신 상태를 확인해주세요.':(err.error?.message||err.message||'계좌 검증 처리에 실패했습니다.'));
    }
    const result=await res.json().catch(()=>({}));
    if(result.data?.alreadyProcessed){
      await syncBackendTransactions();
      closeM();
      render();
      toast(result.message||'이미 처리된 계좌 요청입니다');
      return;
    }
  } catch (e) {
    console.error(e);
    await adminAlert(e.message||'계좌 검증 처리에 실패했습니다.');
    return;
  }

  await syncBackendTransactions();
  closeM();
  render();
  toast(`${f.name} 계좌 검증 완료`);
}

async function rejectAccount(fid,idx){
  const f=D.franchises.find(x=>String(x.id)===String(fid));
  if(!f||!f.deliveryAgencies||!f.deliveryAgencies[idx]){await adminAlert('계좌 요청 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const da=f.deliveryAgencies[idx];
  const r=await adminPrompt('반려 사유를 입력하세요:','');if(r===null)return;
  let requestId=da.requestId;
  let ident=getManagedAccountIdentity(da);
  if(!requestId){
    await syncBackendTransactions();
    const freshF=D.franchises.find(x=>String(x.id)===String(fid));
    const fresh=(freshF?.deliveryAgencies||[]).find(item=>item.accountStatus==='승인대기'&&(item.accountNo===da.accountNo||item.agency===da.agency));
    requestId=fresh?.requestId;
    ident=fresh?getManagedAccountIdentity(fresh):ident;
  }
  if(!requestId&&!ident.id){await adminAlert('DB 계좌 ID가 없습니다. 화면을 새로고침한 뒤 다시 시도해주세요.');return;}

  try {
    const res=await fetch('/api/admin/accounts/approve', {
      method: 'POST',
      headers: {
        ...adminAuthHeaders(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        requestId,
        accountId: ident.id,
        source: ident.source,
        action: 'REJECTED',
        rejectionReason: r
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code||err.code;
      throw new Error(code==='ALREADY_PROCESSED'?'이미 처리된 계좌 요청입니다. 화면을 새로고침해 최신 상태를 확인해주세요.':(err.error?.message||err.message||'계좌 반려 처리에 실패했습니다.'));
    }
    const result=await res.json().catch(()=>({}));
    if(result.data?.alreadyProcessed){
      await syncBackendTransactions();
      closeM();
      render();
      toast(result.message||'이미 처리된 계좌 요청입니다');
      return;
    }
  } catch (e) {
    console.error(e);
    await adminAlert(e.message||'계좌 반려 처리에 실패했습니다.');
    return;
  }

  await syncBackendTransactions();
  closeM();
  render();
  toast(`${f.name} 계좌 반려`);
}
