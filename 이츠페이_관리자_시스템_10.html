<script>
// ═══════════════════════════════
// 데이터
// ═══════════════════════════════
// DB API 응답만 사용합니다. 브라우저 임시 저장 데이터는 사용하지 않습니다.

// ═══ 상태 ═══
let D, page='dashboard', role='hq';
let faqTab='서비스 안내', bannerTab='메인';
let editingAgencies=[];
let backendPollTimer=null;
let backendSnapshot='';
let pendingAccountPage=1;

function getRoles(){return(D.customRoles&&D.customRoles.length)?D.customRoles:CONFIG.roles;}
function getEffRate(ag){return D.agencyFeeRates[ag.id]||ag.feeRate;}
function emptyData(){
  return {
    agencies:[],
    franchises:[],
    deliveryAgencyList:[],
    inquiries:[],
    payments:[],
    pgSettlements:[],
    summary:{},
    pgProviders:[],
    banners:[],
    faqs:[],
    notices:[],
    guides:[],
    admins:[],
    installments:[],
    defaultFeeRate:4.4,
    agencyFeeRates:{},
    customRoles:null,
    nextId:400
  };
}
function save(){}
function load(){D=emptyData();}
async function resetData(){
  if(!await adminConfirm('브라우저 임시 데이터를 비우고 DB 기준으로 다시 불러올까요?','데이터 초기화'))return;
  D=emptyData();
  await syncBackendTransactions();
  render();
  toast('DB 기준으로 새로고침 완료');
}

function getActiveDA(){return D.deliveryAgencyList.filter(a=>a.status==='active').map(a=>a.name);}
function getAllDA(){return D.deliveryAgencyList.filter(a=>a.status!=='deleted');}
function getPending(){const r=[];D.franchises.forEach(f=>{(f.deliveryAgencies||[]).forEach((da,i)=>{if(da.accountStatus==='승인대기')r.push({fid:f.id,fname:f.name,idx:i,...da});});});return r;}

// ═══ 내비게이션 ═══
const HQ_NAV=[
  {s:'대시보드'},{id:'dashboard'},
  {s:'결제'},{id:'payments',sub:1},{id:'pgsettle',sub:1},{id:'settlements',sub:1},
  {s:'가맹점'},{id:'franchises',sub:1},{id:'accounts',sub:1},
  {s:'대리점'},{id:'agencies'},
  {s:'운영'},{id:'deliveryMgmt',sub:1},{id:'inquiries',sub:1},{id:'banners',sub:1},{id:'faqs',sub:1},{id:'installments',sub:1},{id:'pg',sub:1},{id:'fees',sub:1},{id:'admins',sub:1},
  {s:'게시판'},{id:'notices',sub:1},{id:'guides',sub:1},
];
const AG_NAV=[
  {s:'대시보드'},{id:'dashboard'},
  {s:'결제'},{id:'payments',sub:1},
  {s:'가맹점'},{id:'franchises',sub:1},
  {s:'정산'},{id:'settlements',sub:1},
];
function ml(id){return CONFIG.menu[id]||id;}
function setRole(r){role=r;document.getElementById('btn-hq').className='rtb'+(r==='hq'?' on':'');document.getElementById('btn-agent').className='rtb'+(r==='agent'?' on':'');document.getElementById('rlabel').textContent=r==='hq'?'본사 관리자':'영업대리점';page='dashboard';renderNav();renderPage();}
function nav(p){page=p;renderNav();renderPage();}
function renderNav(){
  const items=role==='hq'?HQ_NAV:AG_NAV;
  const pc=getPending().length;
  let h='';
  items.forEach(i=>{
    if(i.s){h+=`<div class="ns">${i.s}</div>`;return;}
    const a=page===i.id?' on':'',s=i.sub?' sub':'';
    const nb=i.nw?'<span class="nb">NEW</span>':'';
    const pb=(i.id==='dashboard'&&pc>0)?`<span class="nb">${pc}</span>`:'';
    h+=`<div class="ni${a}${s}" onclick="nav('${i.id}')">${ml(i.id)}${nb}${pb}</div>`;
  });
  document.getElementById('nav').innerHTML=h;
  document.getElementById('ptitle').textContent=ml(page);
}

// ═══ 헬퍼 ═══
function fmt(n){return Number(n).toLocaleString()+'원';}
function bdg(t){const roles=getRoles().map(r=>r.name);if(roles.includes(t)){const r=getRoles().find(x=>x.name===t);return`<span class="bdg" style="background:${r.color}22;color:${r.color}">${t}</span>`;}const label=t==='롤백'||t==='ROLLED_BACK'?'취소':t;const m={'정상 승인':'bg','승인 대기':'by','승인 거절':'br','승인완료':'bg','승인대기':'by','반려':'br','결제완료':'bg','취소':'br','정산완료':'bg','활성':'bg','비활성':'by','삭제':'br','상담 완료':'bb','상담 대기':'by'};return`<span class="bdg ${m[label]||'bgr'}">${label}</span>`;}
function nid(){return++D.nextId;}

  const el=document.getElementById(id);

function bindAdminPassword(id,toggleId){
  const input=document.getElementById(id);
  const toggle=document.getElementById(toggleId);
  if(!input)return;
  let real=input.dataset.realPassword||'';
  let visible=false;
  const render=(cursor=real.length)=>{
    input.type='text';
    input.dataset.realPassword=real;
    input.value=visible?real:'*'.repeat(real.length);
    if(toggle)toggle.textContent=visible?'숨김':'보기';
    requestAnimationFrame(()=>{
      try{input.setSelectionRange(Math.min(cursor,input.value.length),Math.min(cursor,input.value.length));}catch(e){}
    });
  };
  input.addEventListener('beforeinput',e=>{
    if(visible)return;
    e.preventDefault();
    const start=input.selectionStart??real.length;
    const end=input.selectionEnd??start;
    let cursor=start;
    if(e.inputType==='deleteContentBackward'){
      if(start===end&&start>0){real=real.slice(0,start-1)+real.slice(end);cursor=start-1;}
      else{real=real.slice(0,start)+real.slice(end);}
    }else if(e.inputType==='deleteContentForward'){
      real=real.slice(0,start)+real.slice(start===end?end+1:end);
    }else{
      const inserted=e.data||e.clipboardData?.getData('text')||'';
      real=real.slice(0,start)+inserted+real.slice(end);
      cursor=start+inserted.length;
    }
    render(cursor);
  });
  input.addEventListener('input',()=>{
    if(!visible)return;
    real=input.value;
    input.dataset.realPassword=real;
  });
  toggle?.addEventListener('click',()=>{
    if(visible)real=input.value;
    visible=!visible;
    render(real.length);
    input.focus();
  });
  render(0);
}

async function submitAdminPasswordChange(){
  const currentPassword=adminPasswordValue('admin-current-password');
  const newPassword=adminPasswordValue('admin-new-password');
  const newPassword2=adminPasswordValue('admin-new-password2');
  if(!currentPassword){await adminAlert('현재 비밀번호를 입력해주세요.');return;}
  if(!newPassword||newPassword.length<8){await adminAlert('새 비밀번호는 8자 이상으로 입력해주세요.');return;}
  if(newPassword!==newPassword2){await adminAlert('새 비밀번호 확인이 일치하지 않습니다.');return;}
  try{
    const res=await fetch('/api/admin/me/password',{
      method:'PATCH',
      headers:adminAuthHeaders({'Content-Type':'application/json'}),
      body:JSON.stringify({currentPassword,newPassword})
    });
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'비밀번호 변경에 실패했습니다.');
    closeM();
    await adminAlert('비밀번호가 변경되었습니다.\n현재 화면은 그대로 사용할 수 있고, 다음 로그인부터 새 비밀번호를 사용하면 됩니다.','변경 완료');
  }catch(e){
    await adminAlert(e.message||'비밀번호 변경에 실패했습니다.');
  }
}

async function submitAdminLogin(){
  const email=v('admin-login-email').trim();
  const password=adminPasswordValue('admin-login-password');
  if(!email||!password){await adminAlert('이메일과 비밀번호를 입력하세요.');return;}
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok||!json.success)throw new Error(json.error?.message||json.message||'로그인에 실패했습니다.');
    if(json.data?.user?.role!=='ADMIN')throw new Error('관리자 권한 계정이 아닙니다.');
    sessionStorage.setItem('eatspayAdminToken',json.data.accessToken);
    sessionStorage.setItem('eatspayAdminEmail',email);
    closeM();
    window.__adminLoginResolve&&window.__adminLoginResolve(true);
  }catch(e){
    await adminAlert(e.message||'로그인에 실패했습니다.');
  }
}
async function ensureAdminLogin(){
  if(adminToken())return true;
  return showAdminLogin();
}
async function handleAdminUnauthorized(res){
  if(res.status!==401&&res.status!==403)return false;
  sessionStorage.removeItem('eatspayAdminToken');
  await showAdminLogin('세션이 만료되었거나 관리자 권한 확인이 필요합니다.');
  return true;
}

  <div class="sb2">
    <input class="si" id="ps" placeholder="가맹점명 검색..." oninput="rPay()">
    <input class="si" id="pan" placeholder="승인번호..." oninput="rPay()" style="max-width:150px">

    <select class="fs" style="width:120px" id="pst" onchange="rPay()"><option value="">전체 상태</option><option>결제완료</option><option>취소</option></select>

  <div class="tw"><table><thead><tr><th>거래일시</th><th>승인번호</th><th>대리점</th><th>가맹점명</th><th>구분</th><th>금액</th><th>할부</th><th>상태</th><th>PG</th></tr></thead><tbody id="pb"></tbody></table></div></div>`;}
function clearPS(){['ps','pan','psd','ped'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('pst').value='';rPay();}
function rPay(){
  const q=v('ps'),an=v('pan'),sd=v('psd'),ed=v('ped'),st=v('pst');
  const el=document.getElementById('pb');if(!el)return;
  const rows=D.payments.filter(p=>{
    if(q&&!paymentFranchiseName(p).toLowerCase().includes(q.toLowerCase()))return false;
    if(an&&!p.approvalNo.includes(an))return false;
    if(st&&p.status!==st)return false;
    if(sd&&p.date<sd)return false;
    if(ed&&p.date>ed+' 23:59')return false;
    return true;
  });
  const total=rows.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const totalEl=document.getElementById('pay-total');
  if(totalEl)totalEl.textContent=fmt(total);
  el.innerHTML=rows.map(p=>`<tr><td>${p.date}</td><td><span style="cursor:pointer;color:#3B82F6;font-family:monospace;font-size:11px;text-decoration:underline" onclick="showReceipt(${p.id})">${p.approvalNo}</span></td><td>${p.agency}</td><td>${paymentFranchiseName(p)}</td><td>${p.type}</td><td class="tg">${fmt(p.amount)}</td><td>${p.installment}</td><td>${bdg(p.status)}</td><td>${p.pg}</td></tr>`).join('')||'<tr><td colspan="9" class="emp">검색 결과 없음</td></tr>';
}

  const rows=getAgencySettlementRows();
  return`

function paymentFranchiseName(payment){
  const raw=String(payment?.franchise||'').trim();
  const byId=(D.franchises||[]).find(f=>String(f.id)===raw||String(f.id)===String(payment?.franchiseId||''));
  return byId?.name || raw || '-';
}
function paymentAgencyId(payment){
  if(payment?.agencyId!==undefined&&payment.agencyId!==null&&String(payment.agencyId).trim()!=='')return String(payment.agencyId);
  const raw=String(payment?.franchise||'').trim();
  const franchise=(D.franchises||[]).find(f=>String(f.id)===String(payment?.franchiseId||'')||String(f.id)===raw||f.name===raw);
  return franchise?.agencyId!==undefined&&franchise?.agencyId!==null?String(franchise.agencyId):'';
}
function paymentsForAgency(agId){
  const id=String(agId);
  return (D.payments||[]).filter(p=>paymentAgencyId(p)===id);
}
function getAgencySettlementRows(){
  const r=Number(D.defaultFeeRate||4.4)/100;
  return (D.agencies||[]).map(ag=>{
    const pays=paymentsForAgency(ag.id);
    const amount=pays.reduce((sum,p)=>sum+Number(p.amount||0),0);
    const serviceFee=Math.round(amount*r);
    const net=amount-serviceFee;
    const agencyFee=Math.round(amount*0.003);
    const agencyNet=Math.round(agencyFee*0.967);
    return{agency:ag,payments:pays,count:pays.length,amount,serviceFee,net,agencyFee,agencyNet,rate:getEffRate(ag)};
  });
}
function xlsEscape(v){
  return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function downloadAgencySettlementExcel(){
  const rows=getAgencySettlementRows();
  const detailRows=rows.flatMap(row=>row.payments.map(p=>{
    const amount=Number(p.amount||0);
    const fee=Math.round(amount*(Number(D.defaultFeeRate||4.4)/100));
    return{agency:row.agency.name,date:p.date,approvalNo:p.approvalNo,franchise:paymentFranchiseName(p),amount,net:amount-fee,serviceFee:fee,agencyFee:Math.round(amount*0.003),agencyNet:Math.round(Math.round(amount*0.003)*0.967)};
  }));
  const summary=rows.map(row=>`<tr><td>${xlsEscape(row.agency.name)}</td><td>${row.rate.toFixed(2)}%</td><td>${row.count}</td><td>${row.amount}</td><td>${row.net}</td><td>${row.serviceFee}</td><td>${row.agencyFee}</td><td>${row.agencyNet}</td></tr>`).join('');
  const details=detailRows.length?detailRows.map(row=>`<tr><td>${xlsEscape(row.agency)}</td><td>${xlsEscape(row.date)}</td><td>${xlsEscape(row.approvalNo)}</td><td>${xlsEscape(row.franchise)}</td><td>${row.amount}</td><td>${row.net}</td><td>${row.serviceFee}</td><td>${row.agencyFee}</td><td>${row.agencyNet}</td></tr>`).join(''):`<tr><td colspan="9">정산할 결제 내역이 없습니다.</td></tr>`;
  const html=`<!doctype html><html><head><meta charset="UTF-8"></head><body>
    <h3>이츠페이 대리점 정산</h3>
    <table border="1"><thead><tr><th>대리점명</th><th>수수료율</th><th>전체건</th><th>전체금액</th><th>가맹입금액</th><th>서비스수수료</th><th>영업수수료</th><th>세후 지급</th></tr></thead><tbody>${summary}</tbody></table>
    <br>
    <table border="1"><thead><tr><th>대리점명</th><th>거래일시</th><th>승인번호</th><th>가맹점</th><th>결제금액</th><th>입금액</th><th>서비스수수료</th><th>영업수수료</th><th>세후 지급</th></tr></thead><tbody>${details}</tbody></table>
  </body></html>`;
  const blob=new Blob(['\ufeff',html],{type:'application/vnd.ms-excel;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`eatspay_agency_settlement_${today()}.xls`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),500);
}
function showAgencyPayments(agId,agName){
  const pays=paymentsForAgency(agId);
  if(!pays.length){toast('결제 내역이 없습니다');return;}
  const tot=pays.reduce((s,p)=>s+Number(p.amount||0),0);
  const svcFee=Math.round(tot*0.044);
  const agFee=Math.round(tot*0.003);
  const agNet=Math.round(agFee*0.967);
  openM(`대리점 정산 상세 - ${agName}`,
    `<div class="aw aw-b" style="margin-bottom:12px"><div style="font-size:11px">전체건: <strong>${pays.length}건</strong> &nbsp;|&nbsp; 전체금액: <strong class="tg">${fmt(tot)}</strong> &nbsp;|&nbsp; 서비스수수료: <strong style="color:#EF4444">${fmt(svcFee)}</strong> &nbsp;|&nbsp; 영업 지급예정: <strong class="tg">${fmt(agNet)}</strong></div></div>
    <div class="settlement-detail-scroll"><table><thead><tr><th>거래일시</th><th>승인번호</th><th>가맹점</th><th>결제금액</th><th>입금액(×0.956)</th><th>수수료(×0.044)</th></tr></thead><tbody>
    ${pays.map(p=>{const fee=Math.round(Number(p.amount||0)*0.044);const net=Number(p.amount||0)-fee;return`<tr><td style="font-size:11px">${p.date}</td><td style="font-family:monospace;font-size:10px">${p.approvalNo}</td><td>${paymentFranchiseName(p)}</td><td class="tg">${fmt(p.amount)}</td><td>${fmt(net)}</td><td style="color:#EF4444">${fmt(fee)}</td></tr>`;}).join('')}
    <tr style="background:#F0FAF0;font-weight:700"><td colspan="3">합계</td><td class="tg">${fmt(tot)}</td><td>${fmt(tot-svcFee)}</td><td style="color:#EF4444">${fmt(svcFee)}</td></tr>
    </tbody></table></div>`,
  `<button class="btn bg2" onclick="closeM()">닫기</button>`);
  document.querySelector('#mo .mbox')?.classList.add('wide');
}// ═══ 가맹점 목록 ═══

async function changeFrStatus(id,newStatus,selectEl){
  const f=D.franchises.find(x=>x.id===id);
  if(!f)return;
  if(!await adminConfirm(`'${f.name}'의 상태를 '${newStatus}'로 변경하시겠습니까?`)){
    selectEl.value=f.status;return;
  }
  f.status=newStatus;save();toast(`${f.name} → ${newStatus}`);renderNav();
  // 테이블 새로고침
  setTimeout(rFr,30);
}

function getAvailDA(idx){
  const sel=editingAgencies.map((a,i)=>i!==idx?a.agency:null).filter(Boolean);
  return getAllDA().filter(a=>!sel.includes(a.name));
}

    el.innerHTML=editingAgencies.map(a=>`<div class="da-ro"><span style="font-weight:600;font-size:11px">${a.agency}</span><span style="font-size:11px;color:#6B7280">${a.accountNo||'미입력'}</span><span style="font-size:11px;color:#6B7280">${a.fileName||'미첨부'}</span><span>${bdg(a.accountStatus)}</span></div>`).join('');
  }else{

async function edF(id){const f=D.franchises.find(x=>String(x.id)===String(id));if(!f){await adminAlert('가맹점 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}editingAgencies=JSON.parse(JSON.stringify(f.deliveryAgencies||[]));const roDA=role==='agent';openM('가맹점 수정',franchiseForm(f,roDA),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savF(${id})">저장</button>`);setTimeout(()=>renderDARows(roDA),20);}
async function savF(id){
  const n=v('fn').trim();
  if(!n){await adminAlert('상점명을 입력하세요.');return;}
  const deliveryAccounts=editingAgencies.map(a=>({
    agencyName:a.agency,
    bankName:a.bankName||a.agency,
    accountHolder:v('fo').trim(),
    accountNo:a.accountNo
  })).filter(a=>a.agencyName&&a.accountNo);
  if(deliveryAccounts.length>2){await adminAlert('한 가맹점당 계좌는 최대 2개까지 등록할 수 있습니다.');return;}
  const payload={
    email:v('fe').trim(),
    password:v('fpw'),
    name:n,
    owner:v('fo').trim(),
    phone:v('fp').trim(),
    bizNo:v('fb2').trim(),
    address:v('faddr').trim(),
    tel:v('ftel').trim(),
    agencyId:v('fagencyid'),
    deliveryAccounts
  };
  if(!payload.owner){await adminAlert('대표자명을 입력하세요.');return;}
  if(!payload.bizNo){await adminAlert('사업자등록번호를 입력하세요.');return;}
  if(!id&&(!payload.email||!payload.password)){await adminAlert('로그인 ID와 비밀번호를 입력하세요.');return;}
  try{
    const res=await fetch(id?`/api/admin/franchises/${encodeURIComponent(id)}`:'/api/admin/franchises',{
      method:id?'PUT':'POST',
      headers:adminAuthHeaders({'Content-Type':'application/json'}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code?` [${err.error.code}]`:'';
      throw new Error((err.error?.message||err.message||'가맹점 수정에 실패했습니다.')+code);
    }
    await syncBackendTransactions();
    closeM();
    render();
    toast(id?'가맹점 정보가 수정되었습니다.':'가맹점이 추가되었습니다.');
  }catch(e){
    console.error(e);
    await adminAlert(e.message||'가맹점 저장에 실패했습니다.');
  }
}
async function delF(id){const f=D.franchises.find(x=>x.id===id);if(!f)return;if(!await adminConfirm(`'${f.name}'을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;D.franchises=D.franchises.filter(x=>x.id!==id);save();renderPage();setTimeout(rFr,50);toast('삭제');}

async function editManagedAccount(fid,idx){
  const found=getManagedAccount(fid,idx);
  if(!found){await adminAlert('계좌 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  if(found.account.accountStatus==='승인완료'){await adminAlert('승인완료된 출금계좌는 수정할 수 없습니다.');return;}
  openM('출금계좌 수정',accountEditForm(found.franchise,found.account),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="saveManagedAccount(${fid},${idx})">저장</button>`);
}
async function saveManagedAccount(fid,idx){
  const found=getManagedAccount(fid,idx);
  if(!found){await adminAlert('계좌 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const ident=getManagedAccountIdentity(found.account);
  if(!ident.id){await adminAlert('DB 계좌 ID가 없습니다. 새로고침 후 다시 시도해주세요.');return;}
  const accountNo=v('mae-account').trim();
  if(!/^[0-9-]{8,30}$/.test(accountNo)){await adminAlert('가상계좌번호는 숫자와 하이픈 포함 8~30자리로 입력해주세요.');return;}
  try{
    const formData=new FormData();
    formData.append('source',ident.source);
    formData.append('deliveryAgencyName',v('mae-agency').trim());
    formData.append('agencyName',v('mae-agency').trim());
    formData.append('bankName',v('mae-bank').trim());
    formData.append('accountNo',accountNo);
    formData.append('accountHolder',v('mae-holder').trim());
    formData.append('representativeName',v('mae-holder').trim());
    const file=document.getElementById('mae-document-file')?.files?.[0];
    if(file)formData.append('documentFile',file,file.name);
    const res=await fetch(`/api/admin/accounts/${encodeURIComponent(ident.id)}?source=${encodeURIComponent(ident.source)}`,{
      method:'PUT',
      headers:adminAuthHeaders(),
      body:formData
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||err.message||'계좌 수정에 실패했습니다.');}
    await syncBackendTransactions();
    closeM();
    render();
    toast('출금계좌가 수정되었습니다.');
  }catch(e){
    console.error(e);
    await adminAlert(e.message||'계좌 수정에 실패했습니다.');
  }
}
async function deleteManagedAccount(fid,idx){
  const found=getManagedAccount(fid,idx);
  if(!found){await adminAlert('계좌 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const ident=getManagedAccountIdentity(found.account);
  if(!ident.id){await adminAlert('DB 계좌 ID가 없습니다. 새로고침 후 다시 시도해주세요.');return;}
  if(!await adminConfirm(`'${found.franchise.name}'의 ${found.account.agency||'출금계좌'} 계좌를 삭제하시겠습니까?\n삭제 후에는 앱과 관리자 목록에서 함께 사라집니다.`,'출금계좌 삭제'))return;
  try{
    const res=await fetch(`/api/admin/accounts/${encodeURIComponent(ident.id)}?source=${encodeURIComponent(ident.source)}`,{
      method:'DELETE',
      headers:adminAuthHeaders()
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const code=err.error?.code?` [${err.error.code}]`:'';
      throw new Error((err.error?.message||err.message||'계좌 삭제에 실패했습니다.')+code);
    }
    await syncBackendTransactions();
    closeM();
    render();
    toast('출금계좌가 삭제되었습니다.');
  }catch(e){
    console.error(e);
    await adminAlert(e.message||'계좌 삭제에 실패했습니다.');
  }
}

function edAg(id){const a=D.agencies.find(x=>x.id===id);openM('대리점 수정',agForm(a),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savAg(${id})">저장</button>`);}
async function savAg(id){const n=v('an');if(!n.trim()){await adminAlert('대리점명 필요');return;}const data={name:n.trim(),loginId:v('ai'),level:parseInt(v('al')),region:v('ar'),owner:v('ao'),phone:v('ap'),feeRate:parseFloat(v('af'))||4.2,deliveryNote:v('adn'),parentId:v('aparent')||null,password:v('apw')};if(!id&&(!data.loginId||!data.password)){await adminAlert('신규 대리점은 로그인 ID와 비밀번호가 필요합니다.');return;}try{const res=await fetch(id?`/api/admin/agencies/${encodeURIComponent(id)}`:'/api/admin/agencies',{method:id?'PATCH':'POST',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify(data)});if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||err.message||'대리점 저장에 실패했습니다.');}await syncBackendTransactions({forceRender:true});closeM();toast(id?'대리점이 수정되었습니다.':'대리점이 생성되었습니다.');}catch(e){await adminAlert(e.message||'대리점 저장에 실패했습니다.');}}

    <thead><tr><th>배달대행사명</th><th style="text-align:center">현재 상태</th><th>이용 가맹점 수</th><th>상태 변경</th><th>삭제</th></tr></thead>
    <tbody>${list.map(a=>{

            :`<span style="background:#FEF3C7;color:#92400E;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:700;display:inline-flex;align-items:center"><i class="ico ico-warn"></i>가입 불가</span>`}
        </td>
        <td style="font-size:11px;color:#6B7280">${cnt > 0 ? cnt+'개 가맹점' : '-'}</td>
        <td>
          ${isActive
            ?`<button class="btn bor2 xs" onclick="deactivateDA(${a.id})" title="클릭 시 → 가입 불가 상태로 전환">가입 불가로 전환 →</button>`
            :`<button class="btn bg2 xs" onclick="activateDA(${a.id})" title="클릭 시 → 가입 가능 상태로 전환">← 가입 가능으로 전환</button>`}

async function addDA(){
  const n=await adminPrompt('새 배달대행사 이름:','');if(!n||!n.trim())return;
  if(D.deliveryAgencyList.find(a=>a.name===n.trim()&&a.status!=='deleted')){await adminAlert('이미 존재하는 배달대행사 이름입니다');return;}
  try{
    const res=await fetch('/api/admin/delivery-agencies',{method:'POST',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify({name:n.trim(),status:'active',sortOrder:D.deliveryAgencyList.length+1})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||err.message||'배달대행사 추가에 실패했습니다.');}
    await syncBackendTransactions();renderPage();toast(`'${n.trim()}' 추가됨 — 현재 상태: 가입 가능`);
  }catch(e){await adminAlert(e.message||'배달대행사 추가에 실패했습니다.');}
}
async function updateDeliveryAgencyStatus(id,status,label){
  const a=D.deliveryAgencyList.find(x=>String(x.id)===String(id));if(!a)return;
  try{
    const res=await fetch(`/api/admin/delivery-agencies/${encodeURIComponent(id)}/status`,{method:'PATCH',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify({status})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||err.message||'상태 변경에 실패했습니다.');}
    await syncBackendTransactions();renderPage();toast(`'${a.name}' → ${label}`);
  }catch(e){await adminAlert(e.message||'상태 변경에 실패했습니다.');}
}
async function deactivateDA(id){const a=D.deliveryAgencyList.find(x=>x.id===id);if(!a)return;if(!await adminConfirm(`'${a.name}'을 [가입 불가] 상태로 전환하시겠습니까?\n\n전환 후: 가맹점 계좌 등록 시 선택 불가\n기존 등록 계좌는 유지됩니다.`))return;await updateDeliveryAgencyStatus(id,'inactive','가입 불가 상태로 전환');}
async function activateDA(id){const a=D.deliveryAgencyList.find(x=>x.id===id);if(!a)return;if(!await adminConfirm(`'${a.name}'을 [가입 가능] 상태로 전환하시겠습니까?`))return;await updateDeliveryAgencyStatus(id,'active','가입 가능 상태로 전환');}
async function deleteDA(id){var a=D.deliveryAgencyList.find(function(x){return x.id===id;});if(!a)return;var cnt=D.franchises.filter(function(f){return f.deliveryAgencies.some(function(da){return da.agency===a.name;});}).length;var msg="'"+a.name+"'을 목록에서 삭제하시겠습니까?";if(cnt>0)msg+="\n현재 "+cnt+"개 가맹점에서 사용 중입니다. 기존 계좌 데이터는 유지됩니다.";msg+="\n이 작업은 되돌릴 수 없습니다.";if(!await adminConfirm(msg))return;try{const res=await fetch(`/api/admin/delivery-agencies/${encodeURIComponent(id)}`,{method:'DELETE',headers:adminAuthHeaders()});if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||err.message||'삭제에 실패했습니다.');}await syncBackendTransactions();renderPage();toast("'"+a.name+"' 삭제");}catch(e){await adminAlert(e.message||'삭제에 실패했습니다.');}}

function edInquiry(id){const i=D.inquiries.find(x=>x.id===id);openM('문의 수정',inquiryForm(i),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savInquiry(${id})">저장</button>`);}
async function savInquiry(id){const n=v('iqn');if(!n.trim()){await adminAlert('이름 필요');return;}const data={name:n.trim(),phone:v('iqp'),deliveryAgency:v('iqdp'),region:v('iqr'),handler:v('iqh'),status:v('iqs'),date:today()};if(id){Object.assign(D.inquiries.find(x=>x.id===id),data);toast('수정');}else{D.inquiries.unshift({id:nid(),...data});toast('등록');}save();closeM();renderPage();}

async function delI(id){const i=D.inquiries.find(x=>x.id===id);if(!i)return;if(!await adminConfirm(`'${i.name}' 문의를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;D.inquiries=D.inquiries.filter(x=>x.id!==id);save();renderPage();toast('삭제');}

function pgFAQ(){const cats=[...new Set(D.faqs.map(f=>f.category))];if(!faqTab&&cats.length)faqTab=cats[0];return`

function rFAQ(){const el=document.getElementById('fql');if(!el)return;const items=D.faqs.filter(f=>f.category===faqTab);el.innerHTML=items.map(f=>`<div class="card" style="margin-bottom:8px"><div class="ch" style="padding:10px 14px"><span style="font-weight:700;color:#3D9B35">Q</span><span style="font-weight:600;margin-left:6px">${f.question}</span><div class="ab" style="margin-left:auto"><button class="btn bo xs" onclick="edFQ(${f.id})">수정</button><button class="btn bd xs" onclick="delFQ(${f.id})">삭제</button></div></div><div style="padding:10px 14px;color:#6B7280;font-size:12px"><span style="color:#3D9B35;font-weight:700">A</span>&nbsp;${f.answer}</div></div>`).join('')||'<div class="card"><div class="emp">FAQ가 없습니다.</div></div>';}
async function addFaqCat(){const n=await adminPrompt('새 카테고리 이름:');if(!n)return;D.faqs.push({id:nid(),category:n,question:'새 질문',answer:'새 답변'});faqTab=n;save();renderPage();setTimeout(rFAQ,50);}
function fqForm(f={}){const cats=[...new Set(D.faqs.map(x=>x.category))];return`<div class="fg"><label class="fl">카테고리</label><select class="fs" id="fqc">${cats.map(c=>`<option ${c===(f.category||faqTab)?'selected':''}>${c}</option>`).join('')}</select></div><div class="fg"><label class="fl">질문 *</label><input class="fi" id="fqq" value="${f.question||''}" placeholder="자주 묻는 질문"></div><div class="fg"><label class="fl">답변 *</label><textarea class="fta" id="fqa" rows="5">${f.answer||''}</textarea></div>`;}
function addFQ(){openM('FAQ 추가',fqForm(),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savFQ()">저장</button>`);}
function edFQ(id){const f=D.faqs.find(x=>x.id===id);openM('FAQ 수정',fqForm(f),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savFQ(${id})">저장</button>`);}
async function savFQ(id){const q=v('fqq'),a=v('fqa');if(!q||!a){await adminAlert('질문과 답변 필요');return;}const cat=v('fqc');if(id){const f=D.faqs.find(x=>x.id===id);f.category=cat;f.question=q;f.answer=a;toast('수정');}else{D.faqs.push({id:nid(),category:cat,question:q,answer:a});toast('추가');}faqTab=cat;save();closeM();renderPage();setTimeout(rFAQ,50);}
async function delFQ(id){if(!await adminConfirm('삭제하시겠습니까?'))return;D.faqs=D.faqs.filter(x=>x.id!==id);save();renderPage();setTimeout(rFAQ,50);toast('삭제');}

  if(role==='agent')return`<div class="aw aw-w" style="margin-top:20px">⛔ 수수료율 설정은 본사 관리자만 접근 가능합니다.</div>`;

    ${D.agencies.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#F9FAFB;border-radius:6px;margin-bottom:6px">

async function savDfr(){const val=parseFloat(v('dfr'));if(isNaN(val)||val<=0||val>=100){await adminAlert('올바른 수수료율 입력');return;}D.defaultFeeRate=val;save();toast(`기본 수수료율 ${val}%로 저장`);}

function calcF(){const a=parseFloat((v('ca')||'').replace(/[^0-9.]/g,''))||0;if(!a){document.getElementById('cr').textContent='—';document.getElementById('cf').textContent='';return;}const r=D.defaultFeeRate/100;const ch=Math.round(a/(1-r));document.getElementById('cr').textContent=ch.toLocaleString()+'원';document.getElementById('cf').textContent='수수료: '+(ch-a).toLocaleString()+'원 ('+D.defaultFeeRate+'%)';}

// ═══ 무이자 할부 ═══
const DEFAULT_CARD_COMPANIES=['비씨카드','신한카드','삼성카드','현대카드','롯데카드','국민카드','우리카드','수협카드','농협카드','하나카드'];
function installmentRows(){
  if(Array.isArray(D.installments)){
    return D.installments.map((item,i)=>({
      cardCompany:item.cardCompany,
      months:Array.isArray(item.months)?item.months.map(Number):[],
      active:item.active!==false,
      displayOrder:item.displayOrder||i+1
    }));
  }
  if(D.installments&&typeof D.installments==='object'){
    return Object.entries(D.installments).map(([card,data],i)=>({
      cardCompany:card,
      months:Array.isArray(data.months)?data.months.map(Number):Array.isArray(data.curr)?data.curr.map(Number):[],
      active:data.active!==false,
      displayOrder:data.displayOrder||i+1
    }));
  }
  return [];
}
function pgInst(){
  const months=[2,3,4,5,6];
  const now=new Date();
  const rows=installmentRows();
  const cards=rows.length?rows:DEFAULT_CARD_COMPANIES.map((card,i)=>({cardCompany:card,months:[],active:false,displayOrder:i+1}));
  const label=`금월 (${now.getMonth()+1}월)`;
  return`
  <div class="aw aw-w">💡 이번 달 무이자 할부 개월 수만 설정합니다. 정책이 없으면 앱에는 "무이자할부 정책이 없습니다."로 표시됩니다.</div>
  <div class="card"><div class="ch"><span style="font-weight:700;font-size:14px">카드사별 무이자 할부 설정</span><button class="btn bg2 sm" onclick="savInst()">전체 저장</button></div>
  <div style="padding:14px;overflow-x:auto">
    <div class="inst-grid" style="min-width:520px;grid-template-columns:120px 1fr">
      <div class="inst-hdr" style="text-align:left">카드사</div>
      <div class="inst-hdr">${label}</div>
      ${cards.map((item,idx)=>{
        const card=item.cardCompany;
        const key=card.replace(/[^a-zA-Z0-9가-힣]/g,'_');
        const checkedMonths=Array.isArray(item.months)?item.months.map(Number):[];
        return`
        <div class="inst-cell" style="font-weight:600;font-size:12px">${card}</div>
        <div class="inst-cell" data-card="${card}" data-order="${item.displayOrder||idx+1}">
          ${months.map(mo=>`<label class="ci"><input type="checkbox" class="ci-month" data-card="${card}" data-order="${item.displayOrder||idx+1}" value="${mo}" ${checkedMonths.includes(mo)?'checked':''}>${mo}개</label>`).join('')}
        </div>`;
      }).join('')}
    </div>
  </div></div>`;}
async function savInst(){
  const cardMap=new Map();
  document.querySelectorAll('.ci-month').forEach(el=>{
    const card=el.dataset.card;
    if(!cardMap.has(card))cardMap.set(card,{cardCompany:card,months:[],active:false,displayOrder:Number(el.dataset.order||0)});
    if(el.checked)cardMap.get(card).months.push(Number(el.value));
  });
  const items=[...cardMap.values()].map(item=>({...item,months:[...new Set(item.months)].sort((a,b)=>a-b),active:item.months.length>0}));
  try{
    const res=await fetch('/api/admin/installments',{method:'PUT',headers:adminAuthHeaders({'Content-Type':'application/json'}),body:JSON.stringify({items})});
    if(!res.ok)throw new Error('무이자 할부 저장에 실패했습니다.');
    const json=await res.json();
    D.installments=Array.isArray(json.data)?json.data:items;
    save();
    toast('무이자 할부 설정 저장');
    renderPage();
  }catch(e){
    console.error(e);
    toast(e.message||'무이자 할부 저장 실패');
  }
}

async function syncBackendFranchises() {
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch('/api/admin/franchises', {
      headers: adminAuthHeaders()
    });
    if(await handleAdminUnauthorized(res))return syncBackendFranchises();
    if (!res.ok) return;
    const json = await res.json();
    const items = json.data || [];
    D.franchises = items;
    save();
    renderPage();
  } catch (e) {
    console.error("Failed to sync backend franchises:", e);
  }
}

async function syncBackendTransactions(options={}) {
  const forceRender=!!options.forceRender;
  const silent=!!options.silent;
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch(`/api/admin/bootstrap?_=${Date.now()}`, {
      headers: adminAuthHeaders(),
      cache: 'no-store'
    });
    if(await handleAdminUnauthorized(res))return syncBackendTransactions();
    if (!res.ok) {
      D.franchises = [];
      D.payments = [];
      D.pgSettlements = [];
      D.summary = {};
      save();
      return;
    }
    const json = await res.json();
    const data = json.data || {};
    D.franchises = Array.isArray(data.franchises) ? data.franchises : [];
    D.agencies = Array.isArray(data.agencies) ? data.agencies : D.agencies;
    D.deliveryAgencyList = Array.isArray(data.deliveryAgencies) ? data.deliveryAgencies : D.deliveryAgencyList;
    D.installments = Array.isArray(data.installments) ? data.installments : [];
    D.summary = data.summary && typeof data.summary === 'object' ? data.summary : {};
    D.payments = Array.isArray(data.payments) ? data.payments : [];
    D.pgSettlements = Array.isArray(data.pgSettlements) ? data.pgSettlements : [];
    const nextSnapshot=makeBackendSnapshot();
    const changed=nextSnapshot!==backendSnapshot;
    backendSnapshot=nextSnapshot;
    save();
    if((changed||forceRender)&&!silent){
      render();
    }
    return changed;
  } catch (e) {
    console.error("Failed to sync backend transactions:", e);
    D.franchises = [];
    D.payments = [];
    D.pgSettlements = [];
    D.summary = {};
    save();
  }
}

function startBackendMonitor(){
  if(backendPollTimer)clearInterval(backendPollTimer);
  backendPollTimer=setInterval(async()=>{
    if(document.hidden)return;
    await syncBackendTransactions();
  },3000);
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden)syncBackendTransactions();
  });
}

async function syncBackendAccounts() {
  try {
    if(!await ensureAdminLogin())return;
    const res = await fetch('/api/admin/accounts', {
      headers: adminAuthHeaders()
    });
    if(await handleAdminUnauthorized(res))return syncBackendAccounts();
    if (!res.ok) return;
    const json = await res.json();
    const reqs = json.data || [];
    reqs.forEach(req => {
      const f = D.franchises.find(x => x.bizNo === req.businessNumber || x.name === req.franchiseName);
      if (f) {
        if (!f.deliveryAgencies) f.deliveryAgencies = [];
        const exists = f.deliveryAgencies.some(da => (
          req.requestId && da.requestId === req.requestId
        ) || (
          req.accountNo && da.accountNo === req.accountNo
        ) || (
          req.documentUrl && da.documentUrl === req.documentUrl
        ));
        if (!exists) {
          f.deliveryAgencies.push({
            agency: req.deliveryAgencyName || req.bankName || (req.bankCode === '088' ? '신한은행' : '우리은행'),
            bankName: req.bankName || (req.bankCode === '088' ? '신한은행' : '우리은행'),
            bankCode: req.bankCode || '',
            accountNo: req.accountNo || req.assignedVirtualAccount?.accountNumber || '대기중',
            fileName: req.documentUrl ? req.documentUrl.split('/').pop() : '미첨부',
            documentUrl: req.documentUrl || '',
            accountStatus: req.status === 'PENDING' ? '승인대기' : (req.status === 'APPROVED' ? '승인완료' : '반려'),
            reqDate: req.submittedAt.slice(0, 10),
            requestId: req.requestId
          });
        }
      }
    });
    save();
    renderPage();
  } catch (e) {
    console.error("Failed to sync backend accounts:", e);
  }
}

async function changeFrStatus(id,newStatus,selectEl){
  const f=D.franchises.find(x=>x.id===id);
  if(!await adminConfirm(`'${f.name}'의 상태를 '${newStatus}'로 변경하시겠습니까?`)){
    selectEl.value=f.status;return;
  }

  // Update backend if it has an email
  if (f.email) {
    try {
      const res = await fetch('/api/admin/franchise/approve', {
        method: 'POST',
        headers: {
          ...adminAuthHeaders(),
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email: f.email,
          action: newStatus === '정상 승인' ? 'APPROVED' : 'REJECTED'
        })
      });
      if (!res.ok) {
        await adminAlert('백엔드 상태 변경 전송 실패');
      }
    } catch (e) {
      console.error(e);
    }
  }

  f.status=newStatus;save();toast(`${f.name} → ${newStatus}`);renderNav();
  // 테이블 새로고침
  setTimeout(rFr,30);
}

async function approveAccount(fid,idx){
  const f=D.franchises.find(x=>String(x.id)===String(fid));
  if(!f||!f.deliveryAgencies||!f.deliveryAgencies[idx]){await adminAlert('계좌 요청 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const da=f.deliveryAgencies[idx];
  if(!await adminConfirm(`'${f.name}'의 ${da.agency} 계좌를 승인하시겠습니까?`))return;
  let requestId=da.requestId;
  if(!requestId){
    await syncBackendTransactions();
    const freshF=D.franchises.find(x=>String(x.id)===String(fid));
    const fresh=(freshF?.deliveryAgencies||[]).find(item=>item.accountStatus==='승인대기'&&(item.accountNo===da.accountNo||item.agency===da.agency));
    requestId=fresh?.requestId;
  }
  if(!requestId){await adminAlert('DB 승인 요청 ID가 없습니다. 화면을 새로고침한 뒤 다시 시도해주세요.');return;}

  try {
    const res=await fetch('/api/admin/accounts/approve', {
      method: 'POST',
      headers: {
        ...adminAuthHeaders(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        requestId,
        action: 'APPROVED',
        assignedVirtualAccount: {
          bankCode: da.bankCode || (da.bankName === '신한은행' ? '088' : '020'),
          bankName: da.bankName || da.agency,
          accountNumber: da.accountNo || `562-901-${Math.floor(100000 + Math.random() * 900000)}`,
          accountHolder: `(주)이츠페이_${f.name}`
        }
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||err.message||'계좌 승인 처리에 실패했습니다.');
    }
  } catch (e) {
    console.error(e);
    await adminAlert(e.message||'계좌 승인 처리에 실패했습니다.');
    return;
  }

  await syncBackendTransactions();
  closeM();
  render();
  toast(`${f.name} 계좌 승인 완료`);
}

async function rejectAccount(fid,idx){
  const f=D.franchises.find(x=>String(x.id)===String(fid));
  if(!f||!f.deliveryAgencies||!f.deliveryAgencies[idx]){await adminAlert('계좌 요청 정보를 찾지 못했습니다. 새로고침 후 다시 시도해주세요.');return;}
  const da=f.deliveryAgencies[idx];
  const r=await adminPrompt('반려 사유를 입력하세요:','');if(r===null)return;
  let requestId=da.requestId;
  if(!requestId){
    await syncBackendTransactions();
    const freshF=D.franchises.find(x=>String(x.id)===String(fid));
    const fresh=(freshF?.deliveryAgencies||[]).find(item=>item.accountStatus==='승인대기'&&(item.accountNo===da.accountNo||item.agency===da.agency));
    requestId=fresh?.requestId;
  }
  if(!requestId){await adminAlert('DB 승인 요청 ID가 없습니다. 화면을 새로고침한 뒤 다시 시도해주세요.');return;}

  try {
    const res=await fetch('/api/admin/accounts/approve', {
      method: 'POST',
      headers: {
        ...adminAuthHeaders(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        requestId,
        action: 'REJECTED',
        rejectionReason: r
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||err.message||'계좌 반려 처리에 실패했습니다.');
    }
  } catch (e) {
    console.error(e);
    await adminAlert(e.message||'계좌 반려 처리에 실패했습니다.');
    return;
  }

  await syncBackendTransactions();
  closeM();
  render();
  toast(`${f.name} 계좌 반려`);
}

async function bootAdmin(){
  load();
  await ensureAdminLogin();
  await syncBackendTransactions({silent:true});
  render();
  startBackendMonitor();
}
bootAdmin();
