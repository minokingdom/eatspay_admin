function getRoles(){return(D.customRoles&&D.customRoles.length)?D.customRoles:CONFIG.roles;}
function getEffRate(ag){return D.agencyFeeRates[ag.id]||ag.feeRate;}
function save(){try{localStorage.setItem('ep4',JSON.stringify(D));}catch(e){}}

function resetData(){if(!confirm('모든 데이터를 초기화할까요? (CONFIG 설정 유지)'))return;localStorage.removeItem('ep4');D=JSON.parse(JSON.stringify(IDATA));render();toast('초기화 완료');}

function getActiveDA(){return D.deliveryAgencyList.filter(a=>a.status==='active').map(a=>a.name);}
function getAllDA(){return D.deliveryAgencyList.filter(a=>a.status!=='deleted');}
function getPending(){const r=[];D.franchises.forEach(f=>{(f.deliveryAgencies||[]).forEach((da,i)=>{if(da.accountStatus==='승인대기')r.push({fid:f.id,fname:f.name,idx:i,...da});});});return r;}

function ml(id){return CONFIG.menu[id]||id;}
function setRole(r){role=r;document.getElementById('btn-hq').className='rtb'+(r==='hq'?' on':'');document.getElementById('btn-agent').className='rtb'+(r==='agent'?' on':'');document.getElementById('rlabel').textContent=r==='hq'?'본사 관리자':'영업대리점';page='dashboard';renderNav();renderPage();}
function nav(p){page=p;renderNav();renderPage();}
function renderNav(){
  const items=role==='hq'?HQ_NAV:AG_NAV;
  const pc=getPending().length;
  let h='';
  items.forEach(i=>{
    if(i.s){h+=`<div class="ns">${i.s}</div>`;return;}
    const a=page===i.id?' on':'',s=i.sub?' sub':'';
    const nb=i.nw?'<span class="nb">NEW</span>':'';
    const pb=(i.id==='dashboard'&&pc>0)?`<span class="nb">${pc}</span>`:'';
    h+=`<div class="ni${a}${s}" onclick="nav('${i.id}')">${ml(i.id)}${nb}${pb}</div>`;
  });
  document.getElementById('nav').innerHTML=h;
  document.getElementById('ptitle').textContent=ml(page);
}

function fmt(n){return Number(n).toLocaleString()+'원';}
function bdg(t){const roles=getRoles().map(r=>r.name);if(roles.includes(t)){const r=getRoles().find(x=>x.name===t);return`<span class="bdg" style="background:${r.color}22;color:${r.color}">${t}</span>`;}const m={'정상 승인':'bg','승인 대기':'by','승인 거절':'br','승인완료':'bg','승인대기':'by','반려':'br','결제완료':'bg','취소':'br','정산완료':'bg','롤백':'bor2','활성':'bg','비활성':'by','삭제':'br','상담 완료':'bb','상담 대기':'by'};return`<span class="bdg ${m[t]||'bgr'}">${t}</span>`;}
function nid(){return++D.nextId;}
function today(){return new Date().toISOString().slice(0,10);}
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2500);}
function openM(title,body,foot){document.getElementById('mti').textContent=title;document.getElementById('mbd').innerHTML=body;document.getElementById('mft').innerHTML=foot;document.getElementById('mo').style.display='flex';}
function closeM(){document.getElementById('mo').style.display='none';}
function closeMO(e){if(e.target===document.getElementById('mo'))closeM();}

function showAccountDetail(fid,idx){
  const f=D.franchises.find(x=>x.id===fid);
  const da=f.deliveryAgencies[idx];
  openM(`계좌 등록 확인 — ${f.name}`,`
    <div class="pend-info" style="margin-bottom:14px;font-size:12px">
      <span class="pend-label">가맹점</span><span>${f.name}</span>
      <span class="pend-label">배달대행사</span><span>${da.agency}</span>
      <span class="pend-label">가상계좌번호</span><span style="font-family:monospace;font-weight:700">${da.accountNo||'미입력'}</span>
      <span class="pend-label">증빙 파일명</span><span>${da.fileName||'파일 미첨부'}</span>
      <span class="pend-label">요청일</span><span>${da.reqDate||'-'}</span>
      <span class="pend-label">현재 상태</span><span>${bdg(da.accountStatus)}</span>
    </div>
    <div style="border:2px dashed #D1E8D1;border-radius:8px;padding:28px;text-align:center;background:#F9FAFB">
      <div style="font-size:32px;margin-bottom:8px">📎</div>
      <div style="font-weight:700;color:#1A2E1A">${da.fileName||'파일 없음'}</div>
      <div style="font-size:11px;color:#9CA3AF;margin-top:6px">실제 이미지는 서버에 저장됩니다<br>(개발 시 파일 서버 연동 필요)</div>
    </div>
    ${da.rejectReason?`<div class="aw aw-w" style="margin-top:12px">반려 사유: ${da.rejectReason}</div>`:''}`,
  `${da.accountStatus!=='승인완료'?`<button class="btn bg2" onclick="approveAccount(${fid},${idx});closeM()">승인</button>`:''}
   ${da.accountStatus!=='반려'?`<button class="btn bd" onclick="rejectAccount(${fid},${idx});closeM()">반려</button>`:''}
   <button class="btn bo" onclick="closeM()">닫기</button>`);
}

function approveAccount(fid,idx){
  const f=D.franchises.find(x=>x.id===fid);
  if(!confirm(`'${f.name}'의 ${f.deliveryAgencies[idx].agency} 계좌를 승인하시겠습니까?`))return;
  f.deliveryAgencies[idx].accountStatus='승인완료';
  if(f.status==='승인 대기')f.status='정상 승인';
  save();render();toast(`${f.name} 계좌 승인 완료`);
}
function rejectAccount(fid,idx){
  const f=D.franchises.find(x=>x.id===fid);
  const r=prompt('반려 사유를 입력하세요:','');if(r===null)return;
  f.deliveryAgencies[idx].accountStatus='반려';
  f.deliveryAgencies[idx].rejectReason=r;

  const q=v('ps'),an=v('pan'),sd=v('psd'),ed=v('ped'),st=v('pst');

function pgSettle(){
  const r=D.defaultFeeRate/100;
  const agPayments={};
  D.payments.forEach(p=>{if(!agPayments[p.agencyId])agPayments[p.agencyId]=[];agPayments[p.agencyId].push(p);});
  return`
  <div class="aw aw-w">📊 영업 지급예정 = 거래금액 × 0.3% × 0.967 (3.3% 세금 공제 후). 대리점명 클릭 시 결제 건별 상세 조회.</div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn bo" onclick="toast('정산용 엑셀 다운로드 (서버 연동 필요)')">📥 정산용 엑셀 다운로드</button>
  </div>
  <div class="card"><div class="tw"><table><thead><tr><th>지점명</th><th>수수료율</th><th>전체건</th><th>전체금액</th><th>가맹입금액 (×0.956)</th><th>서비스수수료 (×0.044)</th><th>영업수수료 (×0.3%)</th><th>영업 지급예정 (세후)</th></tr></thead><tbody>
  ${D.agencies.map(ag=>{
    const pays=agPayments[ag.id]||[];
    const amt=pays.reduce((s,p)=>s+p.amount,0);
    const fee=Math.round(amt*r);
    const net=amt-fee;
    const agFee=Math.round(amt*0.003);
    const agNet=Math.round(agFee*0.967);
    const er=getEffRate(ag);
    return`<tr style="cursor:pointer" onclick="showAgencyPayments(${ag.id},'${ag.name}')">
      <td style="font-weight:600;color:#3B82F6;text-decoration:underline">${ag.name} <span style="font-size:10px;color:#9CA3AF">▶ 상세</span></td>
      <td class="tg">${er.toFixed(2)}%</td>
      <td>${pays.length}건</td>
      <td class="tg">${fmt(amt)}</td>
      <td>${fmt(net)}</td>
      <td style="color:#EF4444">${fmt(fee)}</td>
      <td>${fmt(agFee)}</td>
      <td class="tg">${fmt(agNet)}</td>
    </tr>`;
  }).join('')}
  </tbody></table></div></div>`;
}
function showAgencyPayments(agId,agName){
  const pays=D.payments.filter(p=>p.agencyId===agId);
  if(!pays.length){toast('결제 내역이 없습니다');return;}
  const tot=pays.reduce((s,p)=>s+p.amount,0);
  const svcFee=Math.round(tot*0.044);
  const agFee=Math.round(tot*0.003);
  const agNet=Math.round(agFee*0.967);
  openM(`대리점 정산 상세 — ${agName}`,`
    <div class="aw aw-b" style="margin-bottom:12px">
      <div style="font-size:11px">
        전체건: <strong>${pays.length}건</strong> &nbsp;|&nbsp;
        전체금액: <strong class="tg">${fmt(tot)}</strong> &nbsp;|&nbsp;
        서비스수수료: <strong style="color:#EF4444">${fmt(svcFee)}</strong> &nbsp;|&nbsp;

    </div>
    <div class="tw"><table><thead><tr><th>거래일시</th><th>승인번호</th><th>가맹점</th><th>결제금액</th><th>입금액(×0.956)</th><th>수수료(×0.044)</th></tr></thead><tbody>
    ${pays.map(p=>{const fee=Math.round(p.amount*0.044);const net=p.amount-fee;return`<tr><td style="font-size:11px">${p.date}</td><td style="font-family:monospace;font-size:10px">${p.approvalNo}</td><td>${p.franchise}</td><td class="tg">${fmt(p.amount)}</td><td>${fmt(net)}</td><td style="color:#EF4444">${fmt(fee)}</td></tr>`;}).join('')}
    <tr style="background:#F0FAF0;font-weight:700"><td colspan="3">합계</td><td class="tg">${fmt(tot)}</td><td>${fmt(tot-svcFee)}</td><td style="color:#EF4444">${fmt(svcFee)}</td></tr>
    </tbody></table></div>`,
  `<button class="btn bg2" onclick="closeM()">닫기</button>`);
}

    <select class="fs" style="width:130px" id="fst2" onchange="rFr()"><option value="">전체 상태</option><option>정상 승인</option><option>승인 대기</option><option>승인 거절</option></select>
  </div>
  <div class="card"><div class="ch"><span style="font-weight:700;font-size:14px">전체 <span class="tg">${D.franchises.length}개</span></span></div>
  <div class="tw"><table><thead><tr><th>IDX</th><th>상점명</th><th>대리점</th><th>대표자</th><th>연락처</th><th>배달대행사</th><th>가입일시</th><th>마지막 결제일</th><th>상태 변경</th><th>수정</th></tr></thead><tbody id="fb"></tbody></table></div></div>`;}
function rFr(){
  const q=v('fs').toLowerCase(),st=v('fst2');
  const el=document.getElementById('fb');if(!el)return;
  const rows=D.franchises.filter(f=>{
    if(st&&f.status!==st)return false;
    if(!q)return true;
    return f.name.toLowerCase().includes(q)||f.phone.includes(q)||f.owner.toLowerCase().includes(q);
  });
  el.innerHTML=rows.map(f=>`<tr>
    <td style="color:#9CA3AF;font-size:11px">${f.id}</td>
    <td style="font-weight:600">${f.name}</td>
    <td>${f.agency}</td><td>${f.owner}</td><td>${f.phone}</td>
    <td style="font-size:11px">${f.deliveryAgencies&&f.deliveryAgencies.length?f.deliveryAgencies.map(a=>`<span>${a.agency}&nbsp;${bdg(a.accountStatus)}</span>`).join('<br>'):'<span style="color:#9CA3AF">미등록</span>'}</td>
    <td style="font-size:11px">${f.joinDate}</td>
    <td style="font-size:11px">${f.lastPaymentDate||'-'}</td>
    <td>${role==='hq'?`<select class="status-sel" onchange="changeFrStatus(${f.id},this.value,this)">
      <option ${f.status==='정상 승인'?'selected':''} value="정상 승인">정상 승인</option>
      <option ${f.status==='승인 대기'?'selected':''} value="승인 대기">승인 대기</option>
      <option ${f.status==='승인 거절'?'selected':''} value="승인 거절">승인 거절</option>
    </select>`:bdg(f.status)}</td>
    <td><div class="ab">
      <button class="btn bo xs" onclick="edF(${f.id})">수정</button>
      ${role==='hq'?`<button class="btn bd xs" onclick="delF(${f.id})">삭제</button>`:''}
    </div></td>
  </tr>`).join('')||'<tr><td colspan="10" class="emp">검색 결과 없음</td></tr>';
}
function changeFrStatus(id,newStatus,selectEl){
  const f=D.franchises.find(x=>x.id===id);
  if(!confirm(`'${f.name}'의 상태를 '${newStatus}'로 변경하시겠습니까?`)){
    selectEl.value=f.status;return;
  }
  f.status=newStatus;save();toast(`${f.name} → ${newStatus}`);renderNav();
  // 테이블 새로고침
  setTimeout(rFr,30);
}

// 가맹점 배달대행사 폼
function getAvailDA(idx){
  const sel=editingAgencies.map((a,i)=>i!==idx?a.agency:null).filter(Boolean);
  return getAllDA().filter(a=>!sel.includes(a.name));
}
function renderDARows(readonly){
  const el=document.getElementById('da-rows');if(!el)return;
  if(!editingAgencies.length){el.innerHTML=`<div style="color:#9CA3AF;font-size:11px;padding:8px">${readonly?'등록된 배달대행사 없음':'아래 버튼으로 추가하세요.'}</div>`;return;}
  if(readonly){
    el.innerHTML=editingAgencies.map(a=>`<div class="da-ro"><span style="font-weight:600;font-size:11px">${a.agency}</span><span style="font-size:11px;color:#6B7280">${a.accountNo||'미입력'}</span><span style="font-size:11px;color:#6B7280">${a.fileName||'미첨부'}</span><span>${bdg(a.accountStatus)}</span></div>`).join('');
  }else{
    el.innerHTML=editingAgencies.map((a,i)=>{
      const avail=getAvailDA(i);
      const opts=[...new Set([a.agency,...avail.map(x=>x.name)])];
      return`<div class="da-row">
        <select class="fs" style="padding:5px 8px;font-size:11px" onchange="editingAgencies[${i}].agency=this.value;renderDARows(false)">
          ${opts.map(opt=>{const da=D.deliveryAgencyList.find(x=>x.name===opt);const inactive=da&&da.status==='inactive';return`<option value="${opt}" ${opt===a.agency?'selected':''} ${inactive?'disabled':''} style="${inactive?'color:#9CA3AF':''}">${opt}${inactive?' (비활성-고객센터문의)':''}</option>`;}).join('')}
        </select>
        <input class="fi" style="padding:5px 8px;font-size:11px" placeholder="가상계좌번호" value="${a.accountNo||''}" oninput="editingAgencies[${i}].accountNo=this.value">
        <input class="fi" style="padding:5px 8px;font-size:11px" placeholder="파일명(예:계좌증빙.jpg)" value="${a.fileName||''}" oninput="editingAgencies[${i}].fileName=this.value">
        <button class="da-del" onclick="if(confirm('삭제할까요?'))editingAgencies.splice(${i},1);renderDARows(false)">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px">
        <span style="font-size:10px;color:#6B7280">계좌 상태:</span>
        <select style="padding:3px 6px;border:1px solid #D1E8D1;border-radius:4px;font-size:10px" onchange="editingAgencies[${i}].accountStatus=this.value">
          <option ${a.accountStatus==='승인대기'?'selected':''}>승인대기</option>
          <option ${a.accountStatus==='승인완료'?'selected':''}>승인완료</option>
          <option ${a.accountStatus==='반려'?'selected':''}>반려</option>
        </select>
      </div>`;
    }).join('');
  }
}
function addDARow(){const avail=getAvailDA(-1).filter(a=>a.status==='active');if(!avail.length){toast('추가할 수 있는 활성 배달대행사가 없습니다');return;}editingAgencies.push({agency:avail[0].name,accountNo:'',fileName:'',accountStatus:'승인대기',reqDate:today()});renderDARows(false);}
function franchiseForm(f={},roDA){return`
  <div class="fr2"><div class="fg"><label class="fl">상점명 *</label><input class="fi" id="fn" value="${f.name||''}" placeholder="예: 한솥도시락 강남점"></div><div class="fg"><label class="fl">대표자명</label><input class="fi" id="fo" value="${f.owner||''}" placeholder="홍길동"></div></div>

function addF(){editingAgencies=[];openM('가맹점 추가',franchiseForm({},false),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savF()">저장</button>`);setTimeout(()=>renderDARows(false),20);}
function edF(id){const f=D.franchises.find(x=>x.id===id);editingAgencies=JSON.parse(JSON.stringify(f.deliveryAgencies||[]));const roDA=role==='agent';openM('가맹점 수정',franchiseForm(f,roDA),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savF(${id})">저장</button>`);setTimeout(()=>renderDARows(roDA),20);}
function savF(id){const n=v('fn');if(!n.trim()){alert('상점명을 입력하세요');return;}const data={name:n.trim(),owner:v('fo'),phone:v('fp'),bizNo:v('fb2'),agency:v('fa'),note:v('fnt'),deliveryAgencies:JSON.parse(JSON.stringify(editingAgencies))};if(id){Object.assign(D.franchises.find(x=>x.id===id),data);toast('수정');}else{D.franchises.unshift({id:nid(),...data,status:'승인 대기',joinDate:today(),lastPaymentDate:''});toast('가맹점 추가');}save();closeM();renderPage();setTimeout(rFr,50);}
function delF(id){const f=D.franchises.find(x=>x.id===id);if(!confirm(`'${f.name}'을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;D.franchises=D.franchises.filter(x=>x.id!==id);save();renderPage();setTimeout(rFr,50);toast('삭제');}

function rAcc(){
  const q=v('acs').toLowerCase(),st=v('acst');

    </div></td>
  </tr>`).join('')||'<tr><td colspan="8" class="emp">검색 결과 없음</td></tr>';
}

function agForm(a={}){return`

function addAg(){openM('대리점 생성',agForm(),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savAg()">저장</button>`);}
function edAg(id){const a=D.agencies.find(x=>x.id===id);openM('대리점 수정',agForm(a),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savAg(${id})">저장</button>`);}
function savAg(id){const n=v('an');if(!n.trim()){alert('대리점명 필요');return;}const data={name:n.trim(),loginId:v('ai'),level:parseInt(v('al')),region:v('ar'),owner:v('ao'),phone:v('ap'),feeRate:parseFloat(v('af'))||4.2,deliveryNote:v('adn')};if(id){Object.assign(D.agencies.find(x=>x.id===id),data);toast('수정');}else{D.agencies.push({id:nid(),...data});toast('추가');}save();closeM();renderPage();setTimeout(rAg,30);}
function delAg(id){const a=D.agencies.find(x=>x.id===id);if(!confirm(`'${a.name}'을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;D.agencies=D.agencies.filter(x=>x.id!==id);save();renderPage();toast('삭제');}

function savInquiry(id){const n=v('iqn');if(!n.trim()){alert('이름 필요');return;}const data={name:n.trim(),phone:v('iqp'),deliveryAgency:v('iqdp'),region:v('iqr'),handler:v('iqh'),status:v('iqs'),date:today()};if(id){Object.assign(D.inquiries.find(x=>x.id===id),data);toast('수정');}else{D.inquiries.unshift({id:nid(),...data});toast('등록');}save();closeM();renderPage();}

function pgFAQ(){const cats=[...new Set(D.faqs.map(f=>f.category))];if(!faqTab&&cats.length)faqTab=cats[0];return`

function edFQ(id){const f=D.faqs.find(x=>x.id===id);openM('FAQ 수정',fqForm(f),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savFQ(${id})">저장</button>`);}
function savFQ(id){const q=v('fqq'),a=v('fqa');if(!q||!a){alert('질문과 답변 필요');return;}const cat=v('fqc');if(id){const f=D.faqs.find(x=>x.id===id);f.category=cat;f.question=q;f.answer=a;toast('수정');}else{D.faqs.push({id:nid(),category:cat,question:q,answer:a});toast('추가');}faqTab=cat;save();closeM();renderPage();setTimeout(rFAQ,50);}

    <div class="dv"></div>
    <div class="fcalc"><div style="font-size:11px;font-weight:700;margin-bottom:8px">💡 역산 계산기</div>
      <div class="fg" style="margin-bottom:6px"><label class="fl">입금 목표 금액 (원)</label><input class="fi" id="ca" placeholder="1000000" oninput="calcF()"></div>
      <div style="font-size:11px;color:#6B7280">→ 카드 청구금액</div>
      <div class="fcr" id="cr">—</div>
      <div style="font-size:10px;color:#6B7280;margin-top:4px" id="cf"></div>
    </div>
  </div></div></div>
  <div><div class="card"><div class="ch"><span style="font-weight:700;font-size:14px">영업대리점별 수수료율</span></div><div style="padding:14px">
    <div class="aw aw-w">※ 영업대리점은 영업수수료 외 별도 수수료 수취 불가. 본사에서만 설정합니다.</div>
    ${D.agencies.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#F9FAFB;border-radius:6px;margin-bottom:6px">
      <span style="flex:1;font-weight:600;font-size:11px">${a.name}</span>
      <input class="fi" type="number" step="0.01" value="${getEffRate(a)}" style="width:80px;padding:5px 8px;font-size:11px" onchange="savAgF(${a.id},this.value)">
      <span style="font-size:11px;color:#6B7280">%</span>
    </div>`).join('')}
  </div></div></div>
  </div>`;}
function savDfr(){const val=parseFloat(v('dfr'));if(isNaN(val)||val<=0||val>=100){alert('올바른 수수료율 입력');return;}D.defaultFeeRate=val;save();toast(`기본 수수료율 ${val}%로 저장`);}
function savAgF(id,val){D.agencyFeeRates[id]=parseFloat(val)||4.2;save();toast('대리점 수수료율 저장 완료');}
function calcF(){const a=parseFloat((v('ca')||'').replace(/[^0-9.]/g,''))||0;if(!a){document.getElementById('cr').textContent='—';document.getElementById('cf').textContent='';return;}const r=D.defaultFeeRate/100;const ch=Math.round(a/(1-r));document.getElementById('cr').textContent=ch.toLocaleString()+'원';document.getElementById('cf').textContent='수수료: '+(ch-a).toLocaleString()+'원 ('+D.defaultFeeRate+'%)';}

// ═══ 무이자 할부 ═══
function pgInst(){
  const months=[2,3,4,5,6];
  const now=new Date();
  const labels={prev:`전월 (${now.getMonth()}월)`,curr:`금월 (${now.getMonth()+1}월)`,next:`익월 (${now.getMonth()+2}월)`};
  return`
  <div class="aw aw-w">💡 각 월별로 무이자 할부 개월 수를 설정할 수 있습니다.</div>
  <div class="card"><div class="ch"><span style="font-weight:700;font-size:14px">카드사별 무이자 할부 설정</span><button class="btn bg2 sm" onclick="savInst()">전체 저장</button></div>
  <div style="padding:14px;overflow-x:auto">
    <div class="inst-grid" style="min-width:600px">
      <div class="inst-hdr" style="text-align:left">카드사</div>
      <div class="inst-hdr">${labels.prev}</div>
      <div class="inst-hdr">${labels.curr}</div>
      <div class="inst-hdr">${labels.next}</div>
      ${Object.entries(D.installments).map(([card,data])=>`
        <div class="inst-cell" style="font-weight:600;font-size:12px">${card}</div>
        ${['prev','curr','next'].map(m=>`<div class="inst-cell">${months.map(mo=>`<label class="ci"><input type="checkbox" id="ci-${m}-${card.replace(/[^a-zA-Z0-9]/g,'_')}-${mo}" ${(data[m]||[]).includes(mo)?'checked':''}>${mo}개</label>`).join('')}</div>`).join('')}
      `).join('')}
    </div>
  </div></div>`;}
function savInst(){const months=[2,3,4,5,6];Object.keys(D.installments).forEach(card=>{const key=card.replace(/[^a-zA-Z0-9]/g,'_');['prev','curr','next'].forEach(m=>{D.installments[card][m]=months.filter(mo=>{const el=document.getElementById(`ci-${m}-${key}-${mo}`);return el&&el.checked;});});});save();toast('무이자 할부 설정 저장');}

// ═══ 배너 ═══
function pgBanners(){const fl=D.banners.filter(b=>b.type===bannerTab);return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="tabs" style="margin-bottom:0">${['메인','결제'].map(t=>`<div class="tab ${bannerTab===t?'on':''}" onclick="bannerTab='${t}';renderPage()">${t}</div>`).join('')}</div>
    <button class="btn bg2" onclick="addBn()">+ 배너 추가</button>
  </div>
  <div class="card"><div class="tw"><table><thead><tr><th>순서</th><th>제목</th><th>URL</th><th>관리</th></tr></thead><tbody>
  ${fl.map(b=>`<tr><td style="color:#9CA3AF">${b.order}</td><td style="font-weight:600">${b.title}</td><td style="font-size:11px;color:#3B82F6">${b.url}</td><td><div class="ab"><button class="btn bo xs" onclick="edBn(${b.id})">수정</button><button class="btn bd xs" onclick="delBn(${b.id})">삭제</button></div></td></tr>`).join('')||`<tr><td colspan="4" class="emp">배너 없음</td></tr>`}
  </tbody></table></div></div>`;}
function bnF(b={}){return`<div class="fg"><label class="fl">제목 *</label><input class="fi" id="bnt" value="${b.title||''}" placeholder="배너 제목"></div><div class="fg"><label class="fl">링크 URL</label><input class="fi" id="bnu" value="${b.url||''}" placeholder="https://..."></div><div class="fr2"><div class="fg"><label class="fl">위치</label><select class="fs" id="bntp"><option ${(b.type||bannerTab)==='메인'?'selected':''}>메인</option><option ${b.type==='결제'?'selected':''}>결제</option></select></div><div class="fg"><label class="fl">순서</label><input class="fi" id="bno" type="number" value="${b.order||1}"></div></div>`;}
function addBn(){openM('배너 추가',bnF(),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savBn()">저장</button>`);}
function edBn(id){const b=D.banners.find(x=>x.id===id);openM('배너 수정',bnF(b),`<button class="btn bo" onclick="closeM()">취소</button><button class="btn bg2" onclick="savBn(${id})">저장</button>`);}
function savBn(id){const t=v('bnt');if(!t){alert('제목 필요');return;}const data={title:t,url:v('bnu'),type:v('bntp'),order:parseInt(v('bno'))||1};if(id){Object.assign(D.banners.find(x=>x.id===id),data);toast('수정');}else{D.banners.push({id:nid(),...data});toast('추가');}save();closeM();renderPage();}
function delBn(id){if(!confirm('배너를 삭제하시겠습니까?'))return;D.banners=D.banners.filter(x=>x.id!==id);save();renderPage();toast('삭제');}

// ═══ 렌더 ═══
function renderPage(){
  const m={dashboard:pgDash,payments:pgPay,pgsettle:pgPGSettle,settlements:pgSettle,franchises:pgFr,accounts:pgAccounts,agencies:pgAg,deliveryMgmt:pgDeliveryMgmt,faqs:pgFAQ,notices:pgNotices,guides:pgGuides,admins:pgAdmins,pg:pgPG,fees:pgFees,installments:pgInst,inquiries:pgInquiries,banners:pgBanners};
  document.getElementById('ct').innerHTML=(m[page]||pgDash)();
  if(page==='payments')   setTimeout(rPay,30);
  if(page==='pgsettle')   setTimeout(rGS,30);
  if(page==='franchises') setTimeout(rFr,30);
  if(page==='accounts')   setTimeout(rAcc,30);
  if(page==='agencies')   setTimeout(rAg,30);
  if(page==='faqs')       setTimeout(rFAQ,30);
}
function render(){renderNav();renderPage();}
async function syncBackendFranchises() {
  try {
    const res = await fetch('/api/admin/franchises', {
      headers: { 'Authorization': 'Bearer mocked_admin_token' }
    });
    if (!res.ok) return;
    const json = await res.json();
    const items = json.data || [];
    items.forEach(item => {
      const idx = D.franchises.findIndex(f => f.email === item.email || (f.bizNo === item.bizNo && f.name === item.name));
      if (idx !== -1) {
        D.franchises[idx].status = item.status;
      } else {
        D.franchises.unshift(item);
      }
    });
    save();
    renderPage();
  } catch (e) {
    console.error("Failed to sync backend franchises:", e);
  }
}

async function syncBackendAccounts() {
  try {
    const res = await fetch('/api/admin/accounts', {
      headers: { 'Authorization': 'Bearer mocked_admin_token' }
    });
    if (!res.ok) return;
    const json = await res.json();
    const reqs = json.data || [];
    reqs.forEach(req => {
      const f = D.franchises.find(x => x.bizNo === req.businessNumber || x.name === req.franchiseName);
      if (f) {
        if (!f.deliveryAgencies) f.deliveryAgencies = [];
        const exists = f.deliveryAgencies.some(da => da.accountNo === req.assignedVirtualAccount?.accountNumber || da.agency === (req.bankCode === '088' ? '신한은행' : '우리은행'));
        if (!exists) {
          f.deliveryAgencies.push({
            agency: req.bankCode === '088' ? '신한은행' : '우리은행',
            accountNo: req.assignedVirtualAccount?.accountNumber || '대기중',
            fileName: req.documentUrl.split('/').pop(),
            accountStatus: req.status === 'PENDING' ? '승인대기' : (req.status === 'APPROVED' ? '승인완료' : '반려'),
            reqDate: req.submittedAt.slice(0, 10),
            requestId: req.requestId
          });
        }
      }
    });
    save();
    renderPage();
  } catch (e) {
    console.error("Failed to sync backend accounts:", e);
  }
}

async function changeFrStatus(id,newStatus,selectEl){
  const f=D.franchises.find(x=>x.id===id);
  if(!confirm(`'${f.name}'의 상태를 '${newStatus}'로 변경하시겠습니까?`)){
    selectEl.value=f.status;return;
  }

  // Update backend if it has an email
  if (f.email) {
    try {
      const res = await fetch('/api/admin/franchise/approve', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer mocked_admin_token',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email: f.email,
          action: newStatus === '정상 승인' ? 'APPROVED' : 'REJECTED'
        })
      });
      if (!res.ok) {
        alert('백엔드 상태 변경 전송 실패');
      }
    } catch (e) {
      console.error(e);
    }
  }

  f.status=newStatus;save();toast(`${f.name} → ${newStatus}`);renderNav();
  // 테이블 새로고침
  setTimeout(rFr,30);
}

async function approveAccount(fid,idx){
  const f=D.franchises.find(x=>x.id===fid);
  const da=f.deliveryAgencies[idx];
  if(!confirm(`'${f.name}'의 ${da.agency} 계좌를 승인하시겠습니까?`))return;

  if (da.requestId) {
    try {
      await fetch('/api/admin/accounts/approve', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer mocked_admin_token',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          requestId: da.requestId,
          action: 'APPROVED',
          assignedVirtualAccount: {
            bankCode: da.agency === '신한은행' ? '088' : '020',
            bankName: da.agency,
            accountNumber: '562-901-' + Math.floor(100000 + Math.random() * 900000),
            accountHolder: `(주)이츠페이_${f.name}`
          }
        })
      });
    } catch (e) {
      console.error(e);
    }
  }

  da.accountStatus='승인완료';
  if(f.status==='승인 대기')f.status='정상 승인';
  save();render();toast(`${f.name} 계좌 승인 완료`);
}

async function rejectAccount(fid,idx){
  const f=D.franchises.find(x=>x.id===fid);
  const da=f.deliveryAgencies[idx];
  const r=prompt('반려 사유를 입력하세요:','');if(r===null)return;

  if (da.requestId) {
    try {
      await fetch('/api/admin/accounts/approve', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer mocked_admin_token',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          requestId: da.requestId,
          action: 'REJECTED',
          rejectionReason: r
        })
      });
    } catch (e) {
      console.error(e);
    }
  }

  da.accountStatus='반려';
  da.rejectReason=r;
  save();render();toast(`${f.name} 계좌 반려`);
}

load();render();
syncBackendTransactions();
syncBackendFranchises();
syncBackendAccounts();
</script>
